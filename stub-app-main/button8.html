<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button 8 - Random Dog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      text-align: center;
    }

    h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }

    #dog-img {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }

    #loading { color: #64748b; margin-bottom: 16px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background-color: #4f46e5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin: 6px;
    }
    button:hover { background-color: #4338ca; }

    .back-btn { background-color: #64748b; }
    .back-btn:hover { background-color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Dog Image</h1>
    <p>This page fetches a random dog image from the <strong>Dog CEO API</strong>
       (<code>dog.ceo/api/breeds/image/random</code>). Each click returns a random dog photo from their open database.</p>

    <div id="loading">Loading...</div>
    <img id="dog-img" alt="Random Dog" />

    <div>
      <button onclick="fetchDog()">New Dog</button>
      <button class="back-btn" onclick="window.location.href='index.html'">Back</button>
    </div>
  </div>

  <script>
    function fetchDog() {
      var loading = document.getElementById("loading");
      var img = document.getElementById("dog-img");
      loading.style.display = "block";
      img.style.display = "none";

      fetch("https://dog.ceo/api/breeds/image/random")
        .then(function (res) { return res.json(); })
        .then(function (data) {
          img.src = data.message;
          img.style.display = "block";
          loading.style.display = "none";
        })
        .catch(function () {
          loading.textContent = "Failed to fetch. Try again.";
        });
    }

    fetchDog();
  </script>
</body>
</html>
