<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button 2 - API Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      max-width: 700px;
      width: 100%;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .fact {
      margin: 20px 0;
      padding: 16px;
      background: #eef2ff;
      border-radius: 10px;
    }

    .muted {
      color: #555;
    }

    a {
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Joke</h1>
    <p class="muted">This page calls a public API and displays one random joke.</p>

    <div class="fact" id="fact-box">Loading...</div>

    <p>
      This API returns a random joke.
      The displayed text above is fetched from the API response.
    </p>

    <a href="index.html">← Back to homepage</a>
  </div>

  <script>
    async function loadJoke() {
      try {
        const response = await fetch("https://official-joke-api.appspot.com/random_joke");
        const data = await response.json();
        document.getElementById("fact-box").textContent =
          `${data.setup} ${data.punchline}`;
      } catch (error) {
        document.getElementById("fact-box").textContent =
          "Failed to load data from the public API.";
        console.error(error);
      }
    }

    loadJoke();
  </script>
</body>
</html>
