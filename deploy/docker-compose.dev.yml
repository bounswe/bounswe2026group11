# Remote dev droplet: pulls pre-built images from Docker Hub (:latest). No `build:` — CI pushes images separately.
#
# Paths are relative to this file. On the server, mirror the repo layout under e.g. `/opt/sem/`
# (`deploy/`, `nginx/`, `certs/` for TLS, `.env`) and run from that root:
#   docker compose -f deploy/docker-compose.dev.yml pull && docker compose -f deploy/docker-compose.dev.yml up -d
#
# Requires secrets in `.env` and a `DOCKERHUB_NAMESPACE` shell/CI variable for image names
# (see root `.env.example` and docs/deploy.md).

name: sem-dev

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sem
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sem"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  backend:
    image: ${DOCKERHUB_NAMESPACE:?set DOCKERHUB_NAMESPACE in shell or CI}/sem-backend-dev:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: "dev"
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sem
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - app

  frontend:
    image: ${DOCKERHUB_NAMESPACE:?set DOCKERHUB_NAMESPACE in shell or CI}/sem-frontend-dev:latest
    pull_policy: always
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
