name: sem-local

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sem
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sem"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: "local"
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sem
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ../docs/openapi:/usr/share/nginx/html/docs/openapi:ro
      - ../docs/swagger-ui:/usr/share/nginx/html/docs/swagger-ui:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
