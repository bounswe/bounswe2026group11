  /events/{id}/join:
    post:
      tags: [Events]
      summary: Join a public event
      description: |
        Directly joins a **PUBLIC** event. Creates an APPROVED participation record for the
        authenticated user and provisions an `ACTIVE` ticket for event entry flows.

        Rules:
        - The event must exist and have `privacy_level: PUBLIC`.
        - The authenticated user must not be the event host.
        - A user can only join the same event once; a second attempt returns `409`.
        - If the user previously left before `start_time`, the backend reactivates the same participation row as `APPROVED`.
        - If the user left at or after `start_time`, later direct join attempts return `409 already_participating`.
        - Calling this endpoint on a `PROTECTED` event returns `409 event_join_not_allowed`.
      operationId: joinEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to join.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
      responses:
        '201':
          description: Successfully joined the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinEventResponse'
              examples:
                joined:
                  value:
                    participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    event_id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    status: APPROVED
                    created_at: "2026-03-26T11:00:00+03:00"
        '400':
          description: "Invalid event ID format, or the requester's profile is missing a field required by the event (`profile_incomplete`)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
                profile_incomplete_birth_date:
                  summary: User birth date is missing on an age-restricted event
                  value:
                    error:
                      code: profile_incomplete
                      message: Your birth date must be set on your profile to join age-restricted events.
                profile_incomplete_gender:
                  summary: User gender is missing on a gender-restricted event
                  value:
                    error:
                      code: profile_incomplete
                      message: Your gender must be set on your profile to join this event.
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The event host cannot join their own event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                host_cannot_join:
                  value:
                    error:
                      code: host_cannot_join
                      message: The event host cannot join their own event.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '409':
          description: |
            Conflict. Either the user is already participating (`already_participating`),
            the event privacy level does not allow direct join (`event_join_not_allowed`),
            the requester is below the event's minimum age (`age_requirement_not_met`), or
            the requester's gender does not match the event's preferred gender (`gender_requirement_not_met`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: You are already participating in this event.
                event_join_not_allowed:
                  value:
                    error:
                      code: event_join_not_allowed
                      message: Only PUBLIC events can be joined directly.
                age_requirement_not_met:
                  summary: Requester is below the event's minimum age
                  value:
                    error:
                      code: age_requirement_not_met
                      message: You do not meet the minimum age required by this event.
                gender_requirement_not_met:
                  summary: Requester gender does not match the event's preferred gender
                  value:
                    error:
                      code: gender_requirement_not_met
                      message: This event is restricted to participants of a specific gender.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/leave:
    patch:
      tags: [Events]
      summary: Leave an event
      description: |
        Marks the authenticated user's participation as `LEAVED`.

        Rules:
        - The event must exist.
        - The authenticated user must currently have an `APPROVED` participation.
        - The event host cannot leave their own event.
        - A pending join request does not qualify; only approved participants may leave.
        - Leaving is allowed before `start_time` and while the event is still active.
        - Leaving is no longer allowed after the event has ended or once the event is already `CANCELED` or `COMPLETED`.
        - If the user leaves before `start_time`, the event is excluded from completed/past participation lists.
        - If the user leaves before `start_time`, they can join again directly on `PUBLIC` events or submit a new join request on `PROTECTED` events.
        - If the user leaves after `start_time`, completed/past participation lists may still include the event after it finishes.
        - If the user leaves at or after `start_time`, they cannot join the same event again.
      operationId: leaveEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to leave.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
      responses:
        '200':
          description: Successfully left the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveEventResponse'
              examples:
                left:
                  value:
                    participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    event_id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    status: LEAVED
                    updated_at: "2026-03-26T11:30:00+03:00"
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The event host cannot leave their own event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                host_cannot_leave:
                  value:
                    error:
                      code: host_cannot_leave
                      message: The event host cannot leave their own event.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '409':
          description: |
            Conflict. Either the caller is not an approved participant (`event_leave_not_allowed`)
            or the event can no longer be left in its current timing/state (`event_not_leaveable`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                event_leave_not_allowed:
                  value:
                    error:
                      code: event_leave_not_allowed
                      message: Only approved participants can leave this event.
                event_not_leaveable:
                  value:
                    error:
                      code: event_not_leaveable
                      message: This event can no longer be left.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/cancel:
    patch:
      tags: [Events]
      summary: Cancel an event
      description: |
        Transitions an **ACTIVE** event to **CANCELED**. Only the event host may perform this action.

        Rules:
        - The event must exist and have `status: ACTIVE`.
        - Only the authenticated host can cancel their own event.
        - Canceled events are excluded from discovery results but remain accessible via the detail endpoint.
      operationId: cancelEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Event UUID.
      responses:
        "204":
          description: Event canceled successfully.
        "401":
          description: Missing or invalid access token.
        "403":
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_cancel_not_allowed
                  message: Only the event host can cancel this event.
        "404":
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Event is not in ACTIVE status and cannot be canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_not_cancelable
                  message: Only ACTIVE events can be canceled.

  /events/{id}/complete:
    patch:
      tags: [Events]
      summary: Mark event as completed (host)
      description: |
        Transitions an **ACTIVE** or **IN_PROGRESS** event to **COMPLETED**. Only the event host may perform this action.

        Use this to close **open-ended** events (no `end_time`) or to finish a timed event early. The background job may also complete events when `end_time` has passed.

        Rules:
        - The event must exist.
        - Only the authenticated host can complete their own event.
        - If the event is already **CANCELED** or **COMPLETED**, the request returns **409**.
      operationId: completeEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Event UUID.
      responses:
        "204":
          description: Event marked as completed successfully.
        "401":
          description: Missing or invalid access token.
        "403":
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_complete_not_allowed
                  message: Only the event host can complete this event.
        "404":
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Event is already CANCELED or COMPLETED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_not_completable
                  message: The event cannot be completed because it is already CANCELED or COMPLETED.

  /events/{id}/join-request:
    post:
      tags: [Events]
      summary: Request to join a protected event
      description: |
        Submits a join request for a **PROTECTED** event. Creates a `join_request`
        row with `status: PENDING` awaiting host approval.

        Rules:
        - The event must exist and have `privacy_level: PROTECTED`.
        - The authenticated user must not be the event host.
        - A user can only submit one pending request per event; a second attempt returns `409`.
        - After the host rejects a request, the same user must wait **3 days** before requesting again.
        - When the cooldown expires, the backend reactivates the same `join_request` row as `PENDING`.
        - When a reactivated request omits `image_confirm_token`, any previous join-request image is cleared.
        - If the user previously had an approved participation but left before `start_time`, the backend reactivates the same `join_request` row as `PENDING` so the host can approve them again.
        - If the user left at or after `start_time`, later request attempts return `409 already_participating`.
        - Calling this endpoint on a `PUBLIC` event returns `409 event_join_not_allowed`.
      operationId: requestJoinEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to request joining.
          example: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestJoinRequest'
            examples:
              with_message:
                value:
                  message: I have attended similar events and can help with setup.
              with_image:
                value:
                  message: I have attended similar events and can help with setup.
                  image_confirm_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '201':
          description: Join request created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestJoinResponse'
              examples:
                requested:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    status: PENDING
                    image_url: https://sem-bucket.fra1.cdn.digitaloceanspaces.com/events/7a2c8b1e-3d4f-5e6a-bcde-f90123456789/join-requests/11111111-1111-1111-1111-111111111111/upload-id
                    created_at: "2026-03-26T12:00:00+03:00"
        '400':
          description: "Invalid event ID format, malformed JSON body, invalid image confirm token (`image_upload_token_invalid`), or the requester's profile is missing a field required by the event (`profile_incomplete`)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
                profile_incomplete_birth_date:
                  summary: User birth date is missing on an age-restricted event
                  value:
                    error:
                      code: profile_incomplete
                      message: Your birth date must be set on your profile to join age-restricted events.
                profile_incomplete_gender:
                  summary: User gender is missing on a gender-restricted event
                  value:
                    error:
                      code: profile_incomplete
                      message: Your gender must be set on your profile to join this event.
                invalid_image_token:
                  value:
                    error:
                      code: image_upload_token_invalid
                      message: The confirm token is invalid or expired.
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The event host cannot request to join their own event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                host_cannot_join:
                  value:
                    error:
                      code: host_cannot_join
                      message: The event host cannot request to join their own event.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '409':
          description: |
            Conflict. The caller already has a pending request (`already_requested`), is already
            participating (`already_participating`), the event privacy level does not allow join
            requests (`event_join_not_allowed`), a rejection cooldown is still active
            (`join_request_cooldown_active`), the requester is below the event's minimum age
            (`age_requirement_not_met`), or the requester's gender does not match the event's
            preferred gender (`gender_requirement_not_met`), or the image upload is incomplete
            (`image_upload_incomplete`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                already_requested:
                  value:
                    error:
                      code: already_requested
                      message: You already have a pending join request for this event.
                event_join_not_allowed:
                  value:
                    error:
                      code: event_join_not_allowed
                      message: Only PROTECTED events accept join requests.
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: You are already participating in this event.
                join_request_cooldown_active:
                  value:
                    error:
                      code: join_request_cooldown_active
                      message: You must wait 3 days after rejection before requesting to join this event again.
                age_requirement_not_met:
                  summary: Requester is below the event's minimum age
                  value:
                    error:
                      code: age_requirement_not_met
                      message: You do not meet the minimum age required by this event.
                gender_requirement_not_met:
                  summary: Requester gender does not match the event's preferred gender
                  value:
                    error:
                      code: gender_requirement_not_met
                      message: This event is restricted to participants of a specific gender.
                image_upload_incomplete:
                  value:
                    error:
                      code: image_upload_incomplete
                      message: The uploaded image files could not be found. Upload both variants before confirming.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join-requests/{joinRequestId}/approve:
    post:
      tags: [Events]
      summary: Approve a pending join request
      description: |
        Allows the authenticated event host to approve a **PENDING** join request for a
        **PROTECTED** event. Approval updates the join request to `APPROVED` and creates an
        `APPROVED` participation row atomically. If the requester had left before
        `start_time`, approval reactivates the same participation row instead of creating a
        second one. After success, the requester receives an event notification with the
        event image URL when present; notification delivery failures do not fail approval.
      operationId: approveJoinRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event being moderated.
        - name: joinRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the join request to approve.
      responses:
        '200':
          description: Join request approved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveJoinRequestResponse'
              examples:
                approved:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    join_request_status: APPROVED
                    participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    participation_status: APPROVED
                    updated_at: "2026-03-29T12:00:00+03:00"
        '400':
          description: Invalid event ID or join request ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_join_request_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        joinRequestId: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                moderation_not_allowed:
                  value:
                    error:
                      code: join_request_moderation_not_allowed
                      message: Only the event host can moderate join requests.
        '404':
          description: Event or join request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                event_not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
                join_request_not_found:
                  value:
                    error:
                      code: join_request_not_found
                      message: The requested join request does not exist.
        '409':
          description: |
            Conflict. The request is no longer pending (`join_request_state_invalid`), the
            event is full (`capacity_exceeded`), or the requester already has a participation
            row (`already_participating`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_state_invalid:
                  value:
                    error:
                      code: join_request_state_invalid
                      message: Only PENDING join requests can be approved.
                capacity_exceeded:
                  value:
                    error:
                      code: capacity_exceeded
                      message: This event has reached its maximum capacity.
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: The requester is already participating in this event.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join-requests/{joinRequestId}/reject:
    post:
      tags: [Events]
      summary: Reject a pending join request
      description: |
        Allows the authenticated event host to reject a **PENDING** join request for a
        **PROTECTED** event. Rejection updates the join request to `REJECTED` and starts a
        **3-day** re-request cooldown for the same user and event. After success, the
        requester receives an event notification with the event image URL when present;
        notification delivery failures do not fail rejection.
      operationId: rejectJoinRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event being moderated.
        - name: joinRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the join request to reject.
      responses:
        '200':
          description: Join request rejected successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectJoinRequestResponse'
              examples:
                rejected:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    status: REJECTED
                    updated_at: "2026-03-29T12:00:00+03:00"
                    cooldown_ends_at: "2026-04-01T12:00:00+03:00"
        '400':
          description: Invalid event ID or join request ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                moderation_not_allowed:
                  value:
                    error:
                      code: join_request_moderation_not_allowed
                      message: Only the event host can moderate join requests.
        '404':
          description: Event or join request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_not_found:
                  value:
                    error:
                      code: join_request_not_found
                      message: The requested join request does not exist.
        '409':
          description: Conflict. The request is no longer pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_state_invalid:
                  value:
                    error:
                      code: join_request_state_invalid
                      message: Only PENDING join requests can be rejected.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events:
    get:
      tags: [Events]
      summary: Discover nearby events
      description: |
        Returns a cursor-paginated list of nearby discoverable events. Authentication is optional —
        both unauthenticated and authenticated requests are accepted.

        Discovery rules:
        - Only events with `status: ACTIVE` are returned.
        - Only events with `privacy_level: PUBLIC` or `PROTECTED` are returned. `PRIVATE` events
          are never included in discovery results regardless of authentication state.
        - The caller must provide `lat` and `lon`; the server filters within a radius around that origin.
        - Text search (`q`) and structured filters can be combined in the same request.
        - `is_favorited` is resolved for the authenticated caller; unauthenticated callers always
          receive `is_favorited: false`.

        Sorting defaults:
        - If `q` is omitted and `sort_by` is omitted, sorting defaults to `START_TIME`.
        - If `q` is present and `sort_by` is omitted, sorting defaults to `RELEVANCE`.
        - `sort_by=RELEVANCE` is only valid when `q` is present.
        - When sorting by distance, `ROUTE` events use the first route point as their anchor location.

        Pagination:
        - Uses opaque keyset cursors returned in `page_info.next_cursor`.
        - Reuse the same filters and sort order when requesting the next page.
      operationId: discoverEvents
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          description: Latitude of the search origin in WGS 84.
          example: 41.0082
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          description: Longitude of the search origin in WGS 84.
          example: 28.9784
        - name: radius_meters
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50000
          description: Radius around (`lat`, `lon`) in meters. Defaults to `10000` when omitted.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix-aware full-text search query applied to title, description, and denormalized tags.
        - name: privacy_levels
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [PUBLIC, PROTECTED]
          description: Optional comma-separated discoverability filter. `PRIVATE` is not allowed because private events are never returned by this endpoint.
        - name: category_ids
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
              minimum: 1
          description: |
            Optional comma-separated category ids. Matches events whose `category_id` is in the provided set.

            For backward compatibility with the legacy single-category contract, the `category_id` (singular, integer) query parameter is also accepted and treated as a one-element list. When both `category_ids` and `category_id` are present, `category_ids` takes precedence and the singular value is ignored. Non-integer values in either parameter return `400` with the offending field name in `error.details`.
        - name: category_id
          in: query
          required: false
          deprecated: true
          schema:
            type: integer
            minimum: 1
          description: Legacy alias for a one-element `category_ids`. Prefer `category_ids` for new clients.
        - name: start_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Optional inclusive lower bound for `event.start_time`.
        - name: start_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Optional inclusive upper bound for `event.start_time`.
        - name: tag_names
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
          description: Optional comma-separated tags. v1 uses OR semantics, so an event matches if it has any listed tag.
        - name: only_favorited
          in: query
          required: false
          schema:
            type: boolean
          description: When `true`, only returns events favorited by the authenticated user. Defaults to `false` when omitted.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [START_TIME, DISTANCE, RELEVANCE]
          description: |
            Optional sort mode.
            - `START_TIME`: soonest starting events first.
            - `DISTANCE`: nearest events first.
            - `RELEVANCE`: highest full-text rank first; requires `q`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Maximum number of items to return in one page. Defaults to `20` when omitted.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor returned by a previous page of the same query.
        - name: child_friendly
          in: query
          required: false
          schema:
            type: boolean
          description: If true, return only child-friendly events.
        - name: family_oriented
          in: query
          required: false
          schema:
            type: boolean
          description: If true, return only family-oriented events.
      responses:
        '200':
          description: Discovery results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverEventsResponse'
              examples:
                nearby_events:
                  value:
                    items:
                      - id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                        title: Istanbul Trail Run
                        category_name: Sports
                        image_url: https://example.com/trail.jpg
                        start_time: "2026-05-01T08:00:00+03:00"
                        location_address: Belgrad Forest, Istanbul
                        privacy_level: PUBLIC
                        approved_participant_count: 42
                        favorite_count: 8
                        is_favorited: true
                        host_score:
                          final_score: 4.18
                          hosted_event_rating_count: 9
                      - id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                        title: Bosphorus Ride
                        category_name: Fitness
                        image_url: null
                        start_time: "2026-05-01T09:30:00+03:00"
                        location_address: Besiktas, Istanbul
                        privacy_level: PROTECTED
                        approved_participant_count: 18
                        favorite_count: 3
                        is_favorited: false
                        host_score:
                          final_score: null
                          hosted_event_rating_count: 0
                    page_info:
                      next_cursor: eyJzb3J0X2J5IjoiU1RBUlRfVElNRSIsImZpbHRlcl9maW5nZXJwcmludCI6IjQ2MmEifQ
                      has_next: true
        '400':
          description: |
            Validation error for query parameters, cursor reuse, or unsupported sort combinations.
            `error.details` contains field-specific messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_query:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        lat: lat is required
                        lon: lon is required
                invalid_sort:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        sort_by: sort_by=RELEVANCE requires q
                invalid_privacy_filter:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        privacy_levels: "privacy_levels must contain only: PUBLIC, PROTECTED"
                invalid_cursor:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        cursor: cursor does not match the active filters or sort order
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Events]
      summary: Create a new event
      description: |
        Create a point-based or route-based event. The request shape depends on `location_type`.

        Point events require `lat` and `lon`.
        Route events require at least two `route_points`.

        Each event accepts **one** `category_id` only. Use a value that exists in `event_category` (default seed: ids `1`–`20`, see schema).
        A host cannot create two events with the same `title`; duplicate host-title pairs return `409`.
      operationId: createEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
            examples:
              point_event:
                summary: Point-based event
                value:
                  title: Istanbul Trail Run
                  description: A 10 km trail run through Belgrad Forest.
                  image_url: https://example.com/trail.jpg
                  category_id: 1
                  address: Belgrad Forest, Istanbul
                  location_type: POINT
                  lat: 41.1722
                  lon: 28.9744
                  start_time: "2026-05-01T08:00:00+03:00"
                  end_time: "2026-05-01T12:00:00+03:00"
                  privacy_level: PUBLIC
                  capacity: 50
                  minimum_age: 16
                  preferred_gender: MALE
                  tags: [trail, running, outdoor]
                  constraints:
                    - type: equipment
                      info: Trail running shoes required
              route_event:
                summary: Route-based event
                value:
                  title: Bosphorus Ride
                  description: A route-based cycling meetup.
                  category_id: 8
                  address: Besiktas, Istanbul
                  location_type: ROUTE
                  route_points:
                    - lat: 41.0400
                      lon: 29.0000
                    - lat: 41.0500
                      lon: 29.0200
                    - lat: 41.0600
                      lon: 29.0400
                  start_time: "2026-06-12T07:30:00+03:00"
                  privacy_level: PROTECTED
                  tags: [cycling, group-ride]
      responses:
        '201':
          description: Event created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEventResponse'
              examples:
                created:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    title: Istanbul Trail Run
                    privacy_level: PUBLIC
                    status: ACTIVE
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    created_at: "2026-03-26T11:00:00+03:00"
        '400':
          description: |
            Validation error. The response message stays generic and
            `error.details` contains field-specific messages keyed by the problematic field path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_point_payload:
                  summary: Missing required fields and invalid enum values
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        description: description is required
                        category_id: category_id is required
                        privacy_level: "must be one of: PUBLIC, PROTECTED, PRIVATE"
                        preferred_gender: "must be one of: MALE, FEMALE, OTHER"
                invalid_route_payload:
                  summary: Nested validation details for route and constraints
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        route_points: route_points must contain at least 2 points when location_type is ROUTE
                        constraints[0].type: type is required
                        constraints[1].info: info is required
                invalid_category_id:
                  summary: category_id does not exist in event_category
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        category_id: must reference an existing event category id
                start_time_in_past:
                  summary: start_time is not in the future
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        start_time: start_time must be in the future
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_token:
                  value:
                    error:
                      code: missing_token
                      message: Authorization header with Bearer token is required.
        '409':
          description: The authenticated host already has an event with the same title.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                duplicate_host_title:
                  value:
                    error:
                      code: event_title_already_exists
                      message: The host already has an event with this title.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events/{id}/favorite:
    post:
      tags: [Events]
      summary: Add event to favorites
      description: Saves the event to the authenticated user's favorites. Idempotent — calling twice has no additional effect.
      operationId: addFavorite
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event added to favorites (or already favorited).
        '401':
          description: Missing or invalid access token.
    delete:
      tags: [Events]
      summary: Remove event from favorites
      description: Removes the event from the authenticated user's favorites. Idempotent — calling when not favorited has no effect.
      operationId: removeFavorite
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event removed from favorites (or was not favorited).
        '401':
          description: Missing or invalid access token.

  /me/favorites:
    get:
      tags: [Events]
      summary: List favorite events
      description: Returns the authenticated user's favorite events ordered by most recently favorited first.
      operationId: listFavoriteEvents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorite events listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteEventsResponse'
        '401':
          description: Missing or invalid access token.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EventIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the event.
    EventCollectionLimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
      description: Maximum number of items to return. Defaults to `25` when omitted.
    EventCollectionCursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor returned by the previous page of the same collection.
    ParticipationStatusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [APPROVED, PENDING]
        default: APPROVED
      description: Participant status collection to list. Defaults to `APPROVED`.
  schemas:
    CreateEventRequest:
      oneOf:
        - $ref: '#/components/schemas/CreatePointEventRequest'
        - $ref: '#/components/schemas/CreateRouteEventRequest'

    UpdateEventRequest:
      type: object
      additionalProperties: false
      description: Partial event update. Omitted fields remain unchanged.
      properties:
        title:
          type: string
        description:
          type:
            - string
            - "null"
        category_id:
          type:
            - integer
            - "null"
          minimum: 1
        address:
          type:
            - string
            - "null"
        location_type:
          type: string
          enum: [POINT, ROUTE]
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        route_points:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/RoutePointInput'
        start_time:
          type: string
          format: date-time
        end_time:
          type:
            - string
            - "null"
          format: date-time
        capacity:
          type:
            - integer
            - "null"
          minimum: 1
        constraints:
          type: array
          maxItems: 5
          description: Full replacement list. Added constraints require reconfirmation; removals alone do not.
          items:
            $ref: '#/components/schemas/ConstraintInput'

    CreateEventRequestBase:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - category_id
        - location_type
        - start_time
        - privacy_level
      properties:
        title:
          type: string
          description: Event title. Must be unique per host after server-side trimming.
          example: Istanbul Trail Run
        description:
          type: string
          description: Event description.
          example: A 10 km trail run through Belgrad Forest.
        image_url:
          type:
            - string
            - "null"
          description: >
            Optional event cover image URL. Backward-compatible field for callers
            that already host images elsewhere. New clients should prefer the
            direct-upload flow at `POST /events/{id}/image/upload-url`.
        category_id:
          type: integer
          minimum: 1
          description: |
            **Exactly one** category per event: this field is a single integer foreign key to
            `event_category.id` (not an array of categories). With the default migration seed
            (`000011_event_category_seed`), ids `1`–`20` are defined as follows:

            | id | name |
            |---:|------|
            | 1 | Sports |
            | 2 | Music |
            | 3 | Education |
            | 4 | Technology |
            | 5 | Art |
            | 6 | Food & Drink |
            | 7 | Outdoors |
            | 8 | Fitness |
            | 9 | Networking |
            | 10 | Gaming |
            | 11 | Charity |
            | 12 | Photography |
            | 13 | Travel |
            | 14 | Workshops |
            | 15 | Conferences |
            | 16 | Movies & Cinema |
            | 17 | Theatre |
            | 18 | Books & Literature |
            | 19 | Wellness |
            | 20 | Volunteering |

            If your database adds more categories later, valid ids may exceed `20`; the API
            accepts any positive integer that exists in `event_category`. Unknown ids return
            `400` with `error.details.category_id` describing the problem.
          example: 1
        address:
          type:
            - string
            - "null"
          description: Optional human-readable address of the event location.
        start_time:
          type: string
          format: date-time
          description: RFC 3339 date-time with timezone, for example `2026-05-01T08:00:00+03:00`.
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          description: Optional RFC 3339 date-time with timezone. Must be after `start_time`.
          example: "2026-05-01T12:00:00+03:00"
        capacity:
          type:
            - integer
            - "null"
          minimum: 1
          description: Optional maximum participant count. Omit or send `null` for unlimited capacity.
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
          description: |
            - `PUBLIC`: visible to all, joinable without approval.
            - `PROTECTED`: discoverable but requires host approval.
            - `PRIVATE`: only visible to invited users.
        minimum_age:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 120
          description: Optional minimum participant age.
        preferred_gender:
          oneOf:
            - type: string
              enum: [MALE, FEMALE, OTHER]
            - type: "null"
          description: Optional preferred gender for participants.
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 5
          description: Optional tags. At most 5 tags, each at most 20 characters.
          example: [trail, running]
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintInput'
          maxItems: 5
          description: Optional participation constraints. At most 5 items.
        child_friendly:
          type: boolean
          default: false
          description: Whether the event is suitable for children.
        family_oriented:
          type: boolean
          default: false
          description: Whether the event is family-oriented.

    CreatePointEventRequest:
      allOf:
        - $ref: '#/components/schemas/CreateEventRequestBase'
        - type: object
          additionalProperties: false
          required:
            - location_type
            - lat
            - lon
          properties:
            location_type:
              type: string
              enum: [POINT]
              description: Geometry type of the event location.
            lat:
              type: number
              format: double
              description: Latitude of the event location (WGS 84). Required when `location_type` is `POINT`.
              example: 41.1722
            lon:
              type: number
              format: double
              description: Longitude of the event location (WGS 84). Required when `location_type` is `POINT`.
              example: 28.9744

    CreateRouteEventRequest:
      allOf:
        - $ref: '#/components/schemas/CreateEventRequestBase'
        - type: object
          additionalProperties: false
          required:
            - location_type
            - route_points
          properties:
            location_type:
              type: string
              enum: [ROUTE]
              description: Geometry type of the event location.
            route_points:
              type: array
              minItems: 2
              description: Route coordinates in order. Required when `location_type` is `ROUTE`.
              items:
                $ref: '#/components/schemas/RoutePointInput'

    RoutePointInput:
      type: object
      additionalProperties: false
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
          example: 41.0400
        lon:
          type: number
          format: double
          example: 29.0000

    ConstraintInput:
      type: object
      additionalProperties: false
      required: [type, info]
      properties:
        type:
          type: string
          description: Category of the constraint.
          example: equipment
        info:
          type: string
          description: Human-readable description of the constraint.
          example: Trail running shoes required

    DiscoverEventsResponse:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DiscoverEventItem'
        page_info:
          $ref: '#/components/schemas/DiscoverEventsPageInfo'

    DiscoverEventItem:
      type: object
      additionalProperties: false
      required:
        - id
        - version_no
        - title
        - category_name
        - start_time
        - status
        - privacy_level
        - approved_participant_count
        - favorite_count
        - is_favorited
        - host_score
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        title:
          type: string
          description: Event title.
          example: Istanbul Trail Run
        category_name:
          type: string
          description: Human-readable event category name.
          example: Sports
        image_url:
          type:
            - string
            - "null"
          description: Optional event cover image URL.
          example: https://example.com/trail.jpg
        start_time:
          type: string
          format: date-time
          description: Event start time.
          example: "2026-05-01T08:00:00+03:00"
        status:
          type: string
          description: Event lifecycle state. The discovery endpoint returns only ACTIVE events (not IN_PROGRESS).
          enum: [ACTIVE]
          example: ACTIVE
        location_address:
          type:
            - string
            - "null"
          description: Optional human-readable location address.
          example: Belgrad Forest, Istanbul
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED]
          description: Visibility level for the discoverable event.
          example: PUBLIC
        approved_participant_count:
          type: integer
          minimum: 0
          description: Current count of approved participants.
          example: 42
        favorite_count:
          type: integer
          minimum: 0
          description: Total number of users who have favorited this event.
          example: 8
        is_favorited:
          type: boolean
          description: Whether the authenticated user has favorited the event.
          example: true
        host_score:
          $ref: '#/components/schemas/EventHostScoreSummary'
        child_friendly:
          type: boolean
          description: Whether the event is suitable for children.
        family_oriented:
          type: boolean
          description: Whether the event is family-oriented.

    DiscoverEventsPageInfo:
      type: object
      additionalProperties: false
      required: [next_cursor, has_next]
      properties:
        next_cursor:
          type:
            - string
            - "null"
          description: Opaque cursor for the next page, or `null` when there is no next page.
          example: eyJzb3J0X2J5IjoiU1RBUlRfVElNRSIsImZpbHRlcl9maW5nZXJwcmludCI6IjQ2MmEifQ
        has_next:
          type: boolean
          description: Indicates whether more results are available.
          example: true

    GetEventDetailResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - privacy_level
        - status
        - start_time
        - approved_participant_count
        - pending_participant_count
        - favorite_count
        - created_at
        - updated_at
        - host
        - host_score
        - location
        - tags
        - constraints
        - rating_window
        - viewer_event_rating
        - viewer_context
      properties:
        id:
          type: string
          format: uuid
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        version_no:
          type: integer
          minimum: 1
          description: Latest persisted event version.
          example: 5
        title:
          type: string
          example: Istanbul Trail Run
        description:
          type:
            - string
            - "null"
          example: A 10 km trail run through Belgrad Forest.
        image_url:
          type:
            - string
            - "null"
          example: https://example.com/trail.jpg
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
        status:
          type: string
          description: Current event status as stored in the database, for example `ACTIVE`, `IN_PROGRESS`, `CANCELED`, or `COMPLETED`.
          example: ACTIVE
        start_time:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-05-01T12:00:00+03:00"
        capacity:
          type:
            - integer
            - "null"
          minimum: 1
          example: 25
        minimum_age:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 120
          example: 18
        preferred_gender:
          oneOf:
            - type: string
              enum: [MALE, FEMALE, OTHER]
            - type: "null"
        child_friendly:
          type: boolean
          description: Whether the event is suitable for children.
        family_oriented:
          type: boolean
          description: Whether the event is family-oriented.
        approved_participant_count:
          type: integer
          minimum: 0
          example: 12
        pending_participant_count:
          type: integer
          minimum: 0
          example: 0
        favorite_count:
          type: integer
          minimum: 0
          example: 8
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T11:00:00+03:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-27T09:30:00+03:00"
        category:
          oneOf:
            - $ref: '#/components/schemas/EventDetailCategory'
            - type: "null"
        host:
          $ref: '#/components/schemas/EventDetailUserSummary'
        host_score:
          $ref: '#/components/schemas/EventHostScoreSummary'
        location:
          $ref: '#/components/schemas/EventDetailLocation'
        tags:
          type: array
          items:
            type: string
          example: [trail, running]
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintInput'
        rating_window:
          $ref: '#/components/schemas/EventDetailRatingWindow'
        viewer_event_rating:
          oneOf:
            - $ref: '#/components/schemas/EventDetailEmbeddedRating'
            - type: "null"
        viewer_context:
          $ref: '#/components/schemas/EventDetailViewerContext'
        host_context:
          oneOf:
            - $ref: '#/components/schemas/EventDetailHostContext'
            - type: "null"
          description: Host-only embedded management context when included by the backend. Pending join request items include optional `image_url`.

    EventHostContextSummaryResponse:
      type: object
      additionalProperties: false
      required: [approved_participant_count, pending_join_request_count, invitation_count]
      properties:
        approved_participant_count:
          type: integer
          minimum: 0
        pending_join_request_count:
          type: integer
          minimum: 0
        invitation_count:
          type: integer
          minimum: 0

    EventCollectionPageInfo:
      type: object
      additionalProperties: false
      required: [next_cursor, has_next]
      properties:
        next_cursor:
          type:
            - string
            - "null"
        has_next:
          type: boolean

    EventApprovedParticipantsResponse:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailApprovedParticipant'
        page_info:
          $ref: '#/components/schemas/EventCollectionPageInfo'

    EventPendingJoinRequestsResponse:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailPendingJoinRequest'
        page_info:
          $ref: '#/components/schemas/EventCollectionPageInfo'

    EventInvitationsResponse:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailInvitation'
        page_info:
          $ref: '#/components/schemas/EventCollectionPageInfo'

    CreateEventInvitationsRequest:
      type: object
      additionalProperties: false
      required: [usernames]
      properties:
        usernames:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
          description: Exact usernames to invite. Unknown and syntactically invalid values are reported in the response.
        message:
          type:
            - string
            - "null"
          description: Optional message stored on each successful invitation.

    CreateEventInvitationsResponse:
      type: object
      additionalProperties: false
      required: [success_count, invalid_username_count, failed_count, successful_invitations, invalid_usernames, failed]
      properties:
        success_count:
          type: integer
          minimum: 0
        invalid_username_count:
          type: integer
          minimum: 0
        failed_count:
          type: integer
          minimum: 0
        successful_invitations:
          type: array
          items:
            $ref: '#/components/schemas/CreatedEventInvitation'
        invalid_usernames:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/EventInvitationFailure'

    CreatedEventInvitation:
      type: object
      additionalProperties: false
      required: [invitation_id, event_id, invited_user_id, username, status, created_at]
      properties:
        invitation_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        invited_user_id:
          type: string
          format: uuid
        username:
          type: string
        status:
          type: string
          enum: [PENDING]
        created_at:
          type: string
          format: date-time

    EventInvitationFailure:
      type: object
      additionalProperties: false
      required: [username, code]
      properties:
        username:
          type: string
        code:
          type: string
          enum: [ALREADY_INVITED, ALREADY_PARTICIPATING, HOST_USER, DECLINE_COOLDOWN_ACTIVE, CAPACITY_EXCEEDED, DUPLICATE_USERNAME]

    EventDetailCategory:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: integer
          minimum: 1
          example: 7
        name:
          type: string
          example: Outdoors

    EventDetailUserSummary:
      type: object
      additionalProperties: false
      required: [id, username]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: host_user
        display_name:
          type:
            - string
            - "null"
          example: Host User
        avatar_url:
          type:
            - string
            - "null"
          example: https://example.com/avatar.png

    EventDetailHostContextUserSummary:
      type: object
      additionalProperties: false
      required: [id, username, final_score, rating_count]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: approved_user
        display_name:
          type:
            - string
            - "null"
          example: Approved User
        avatar_url:
          type:
            - string
            - "null"
          example: https://example.com/avatar.png
        final_score:
          type:
            - number
            - "null"
          format: double
          example: 4.4
        rating_count:
          type: integer
          minimum: 0
          example: 5

    EventDetailLocation:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          enum: [POINT, ROUTE]
        address:
          type:
            - string
            - "null"
          example: Belgrad Forest, Istanbul
        point:
          oneOf:
            - $ref: '#/components/schemas/EventDetailPoint'
            - type: "null"
        route_points:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailPoint'

    EventDetailPoint:
      type: object
      additionalProperties: false
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
          example: 41.1722
        lon:
          type: number
          format: double
          example: 28.9744

    EventDetailViewerContext:
      type: object
      additionalProperties: false
      required:
        - is_host
        - is_favorited
        - participation_status
        - join_request_status
        - invitation_status
        - needs_reconfirmation
        - last_confirmed_event_version
        - latest_event_version
        - event_diff
      properties:
        is_host:
          type: boolean
        is_favorited:
          type: boolean
        participation_status:
          oneOf:
            - type: string
              enum: [APPROVED, PENDING, LEAVED, CANCELED]
            - type: "null"
          description: |
            Actual participation-row status for the authenticated user, or `null`
            when the user has not accepted/joined the event. Pending join requests
            do not populate this field.
        join_request_status:
          oneOf:
            - type: string
              enum: [PENDING, APPROVED, REJECTED, CANCELED]
            - type: "null"
          description: Latest join-request status for the viewer on this event, or `null`.
        invitation_status:
          oneOf:
            - type: string
              enum: [PENDING, ACCEPTED, DECLINED, EXPIRED, CANCELED]
            - type: "null"
          description: Latest invitation status for the viewer on this event, or `null`.
        needs_reconfirmation:
          type: boolean
          description: True when the viewer's accepted participation is pending reconfirmation against a newer event version.
        last_confirmed_event_version:
          type:
            - integer
            - "null"
          minimum: 1
          description: Event version last accepted by this viewer's participation, or `null` when there is no participation.
        latest_event_version:
          type: integer
          minimum: 1
          description: Latest event version number.
        event_diff:
          oneOf:
            - $ref: '#/components/schemas/EventDetailDiff'
            - type: "null"
          description: Viewer-specific diff from `last_confirmed_event_version` to the latest version when reconfirmation is needed.

    EventDetailDiff:
      type: object
      additionalProperties: false
      required: [from_version_no, to_version_no, changed_fields, changes]
      properties:
        from_version_no:
          type: integer
          minimum: 1
        to_version_no:
          type: integer
          minimum: 1
        changed_fields:
          type: array
          items:
            type: string
          example: [title, start_time, location]
        changes:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailDiffChange'

    EventDetailDiffChange:
      type: object
      additionalProperties: false
      required: [field, old_value, new_value]
      properties:
        field:
          type: string
          description: Event detail field that changed.
          example: start_time
        old_value:
          description: Value from the viewer's last confirmed event version.
        new_value:
          description: Value from the latest event version.

    EventHostScoreSummary:
      type: object
      additionalProperties: false
      required: [final_score, hosted_event_rating_count]
      properties:
        final_score:
          type:
            - number
            - "null"
          format: double
          example: 4.18
        hosted_event_rating_count:
          type: integer
          minimum: 0
          example: 9

    EventDetailRatingWindow:
      type: object
      additionalProperties: false
      required: [opens_at, closes_at, is_active]
      properties:
        opens_at:
          type: string
          format: date-time
        closes_at:
          type: string
          format: date-time
        is_active:
          type: boolean

    EventDetailEmbeddedRating:
      type: object
      additionalProperties: false
      required: [id, rating, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EventDetailHostContext:
      type: object
      additionalProperties: false
      required: [approved_participants, pending_join_requests, invitations]
      properties:
        approved_participants:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailApprovedParticipant'
        pending_join_requests:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailPendingJoinRequest'
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailInvitation'

    EventDetailApprovedParticipant:
      type: object
      additionalProperties: false
      required: [participation_id, status, created_at, updated_at, host_rating, user]
      properties:
        participation_id:
          type: string
          format: uuid
        status:
          type: string
          example: APPROVED
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        host_rating:
          oneOf:
            - $ref: '#/components/schemas/EventDetailEmbeddedRating'
            - type: "null"
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    EventDetailPendingJoinRequest:
      type: object
      additionalProperties: false
      required: [join_request_id, status, created_at, updated_at, user]
      properties:
        join_request_id:
          type: string
          format: uuid
        status:
          type: string
          example: PENDING
        message:
          type:
            - string
            - "null"
          example: I have attended similar events before.
        image_url:
          type:
            - string
            - "null"
          format: uri
          description: Optional image attached by the requester. Append `-small` to fetch the small variant.
          example: https://sem-bucket.fra1.cdn.digitaloceanspaces.com/events/7a2c8b1e-3d4f-5e6a-bcde-f90123456789/join-requests/11111111-1111-1111-1111-111111111111/upload-id
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    EventDetailInvitation:
      type: object
      additionalProperties: false
      required: [invitation_id, status, created_at, updated_at, user]
      properties:
        invitation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, ACCEPTED, DECLINED, EXPIRED]
        message:
          type:
            - string
            - "null"
          example: Join us if you are available.
        expires_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-30T23:59:59+03:00"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    EventCommentsResponse:
      type: object
      additionalProperties: false
      required: [discussion_comments, review_comments]
      properties:
        discussion_comments:
          $ref: '#/components/schemas/EventCommentCollection'
        review_comments:
          $ref: '#/components/schemas/EventCommentCollection'

    EventCommentCollection:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventComment'
        page_info:
          $ref: '#/components/schemas/EventCommentPageInfo'

    EventCommentPageInfo:
      type: object
      additionalProperties: false
      required: [next_cursor, has_next]
      properties:
        next_cursor:
          type:
            - string
            - "null"
          description: Opaque cursor for the next page, or `null` when there is no next page.
        has_next:
          type: boolean

    EventComment:
      type: object
      additionalProperties: false
      required:
        - id
        - event_id
        - user
        - comment_type
        - message
        - parent_id
        - rating
        - image_url
        - likes_count
        - reply_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/EventCommentAuthor'
        comment_type:
          type: string
          enum: [DISCUSSION, REVIEW]
        message:
          type: string
          minLength: 1
          maxLength: 1000
        parent_id:
          type:
            - string
            - "null"
          format: uuid
          description: Present only for discussion replies.
        rating:
          type:
            - integer
            - "null"
          minimum: 1
          maximum: 5
          description: Present only for REVIEW comments.
        image_url:
          type:
            - string
            - "null"
          format: uri
          description: Optional image URL for REVIEW comments.
        likes_count:
          type: integer
          minimum: 0
        reply_count:
          type: integer
          minimum: 0
          description: Number of direct replies. Child comments are never embedded in list responses.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EventCommentAuthor:
      type: object
      additionalProperties: false
      required: [id, username, display_name, avatar_url]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type:
            - string
            - "null"
        avatar_url:
          type:
            - string
            - "null"
          format: uri

    CreateDiscussionCommentRequest:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
        parent_id:
          type:
            - string
            - "null"
          format: uuid
          description: Top-level DISCUSSION comment id when creating a reply; omit/null for top-level comments.

    UpsertReviewCommentRequest:
      type: object
      additionalProperties: false
      required: [message, rating]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
        rating:
          type: integer
          minimum: 1
          maximum: 5
        image_confirm_token:
          type:
            - string
            - "null"
          description: Optional confirm token returned by the review image upload flow.

    CreateEventReportRequest:
      type: object
      additionalProperties: false
      required: [report_category, message]
      properties:
        report_category:
          type: string
          enum:
            - SAFETY
            - HARASSMENT
            - SPAM_OR_SCAM
            - INAPPROPRIATE_CONTENT
            - EVENT_NOT_AS_DESCRIBED
            - ILLEGAL_OR_DANGEROUS
            - OTHER
          description: User-selected reason for reporting the event.
        message:
          type: string
          minLength: 1
          maxLength: 1000
          description: Required free-form report details. Blank-after-trim strings are rejected.
        image_confirm_token:
          type:
            - string
            - "null"
          description: Optional confirm token returned by the report image upload flow.

    EventReportResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - event_id
        - reporter_user_id
        - report_category
        - message
        - image_url
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        reporter_user_id:
          type: string
          format: uuid
        report_category:
          type: string
          enum:
            - SAFETY
            - HARASSMENT
            - SPAM_OR_SCAM
            - INAPPROPRIATE_CONTENT
            - EVENT_NOT_AS_DESCRIBED
            - ILLEGAL_OR_DANGEROUS
            - OTHER
        message:
          type: string
          minLength: 1
          maxLength: 1000
        image_url:
          type:
            - string
            - "null"
          format: uri
          description: Public CDN base URL for the optional report image. Append `-small` for the small variant.
        status:
          type: string
          enum: [PENDING, REVIEWED, DISMISSED]
          description: Newly created reports are returned as `PENDING`.
        created_at:
          type: string
          format: date-time

    RatingWriteRequest:
      type: object
      additionalProperties: false
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        message:
          type:
            - string
            - "null"
          minLength: 10
          maxLength: 100
          description: Optional feedback message. Blank-after-trim strings are treated as `null`.
          example: Great event host.

    RatingResponse:
      type: object
      additionalProperties: false
      required: [id, rating, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEventResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - privacy_level
        - status
        - start_time
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the newly created event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        title:
          type: string
          description: Title of the created event.
          example: Istanbul Trail Run
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
          example: PUBLIC
        status:
          type: string
          enum: [ACTIVE]
          example: ACTIVE
        start_time:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-05-01T12:00:00+03:00"
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T11:00:00+03:00"

    UpdateEventResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - privacy_level
        - status
        - start_time
        - version_no
        - reconfirmation_required
        - reconfirmation_triggered_fields
        - participants_marked_pending
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
        status:
          type: string
          enum: [ACTIVE]
        start_time:
          type: string
          format: date-time
        end_time:
          type:
            - string
            - "null"
          format: date-time
        version_no:
          type: integer
          minimum: 0
        reconfirmation_required:
          type: boolean
        reconfirmation_triggered_fields:
          type: array
          items:
            type: string
            enum: [title, description, category_id, location, start_time, end_time, constraints]
        participants_marked_pending:
          type: integer
          minimum: 0
        updated_at:
          type: string
          format: date-time

    ReconfirmParticipationResponse:
      type: object
      additionalProperties: false
      required:
        - participation_id
        - event_id
        - status
        - reconfirmed_at
        - updated_at
        - last_confirmed_event_version
        - latest_event_version
      properties:
        participation_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [APPROVED]
        reconfirmed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_confirmed_event_version:
          type: integer
          minimum: 1
          description: Event version accepted by this reconfirmation.
        latest_event_version:
          type: integer
          minimum: 1
          description: Latest event version at reconfirmation time.
        ticket_status:
          type: string
          enum: [ACTIVE]

    ImageUploadInitResponse:
      type: object
      additionalProperties: false
      required: [base_url, version, confirm_token, uploads]
      properties:
        base_url:
          type: string
          description: >
            CDN base URL persisted after the corresponding confirm or create mutation.
            Append `-small` to fetch the small variant.
          example: "https://sem-bucket.fra1.cdn.digitaloceanspaces.com/events/5f81d6de-8cb4-4639-8f60-7c9f55456121/cover/v2-2c1a8d5a-77c5-4e6a-b5da-84af656ba6fa"
        version:
          type: integer
          minimum: 1
          description: New image version reserved for this upload attempt.
          example: 2
        confirm_token:
          type: string
          description: Opaque signed token required by the confirm endpoint.
        uploads:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/ImageUploadInstruction'

    ImageUploadInstruction:
      type: object
      additionalProperties: false
      required: [variant, method, url, headers]
      properties:
        variant:
          type: string
          enum: [ORIGINAL, SMALL]
        method:
          type: string
          enum: [PUT]
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
          description: >
            Headers that must be sent exactly as returned. Current uploads require
            `Content-Type: image/jpeg` and
            `Cache-Control: public, max-age=604800, immutable`, and
            `x-amz-acl: public-read`.
          example:
            Content-Type: image/jpeg
            Cache-Control: public, max-age=604800, immutable
            x-amz-acl: public-read

    ImageUploadConfirmRequest:
      type: object
      additionalProperties: false
      required: [confirm_token]
      properties:
        confirm_token:
          type: string
          description: Opaque signed token returned by the corresponding upload-url endpoint.

    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    ErrorBody:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: The request body contains invalid fields.
        details:
          type: object
          additionalProperties:
            type: string
          description: Optional field-level validation details keyed by field name.

    JoinEventResponse:
      type: object
      additionalProperties: false
      required: [participation_id, event_id, status, created_at]
      properties:
        participation_id:
          type: string
          format: uuid
          description: UUID of the created or reactivated participation record.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        event_id:
          type: string
          format: uuid
          description: UUID of the joined event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        status:
          type: string
          enum: [APPROVED]
          description: Participation status. Always `APPROVED` for direct joins of public events.
          example: APPROVED
        created_at:
          type: string
          format: date-time
          description: Timestamp of the join or rejoin activation.
          example: "2026-03-26T11:00:00+03:00"

    LeaveEventResponse:
      type: object
      additionalProperties: false
      required: [participation_id, event_id, status, updated_at]
      properties:
        participation_id:
          type: string
          format: uuid
          description: UUID of the updated participation record.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        event_id:
          type: string
          format: uuid
          description: UUID of the event that was left.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        status:
          type: string
          enum: [LEAVED]
          description: Participation status after leaving. Always `LEAVED`.
          example: LEAVED
        updated_at:
          type: string
          format: date-time
          example: "2026-03-26T11:30:00+03:00"

    RequestJoinRequest:
      type: object
      additionalProperties: false
      properties:
        message:
          type:
            - string
            - "null"
          description: Optional note from the requester to the event host. Omit or send `null` when no message is needed.
          example: I have attended similar events and can help with setup.
        image_confirm_token:
          type:
            - string
            - "null"
          description: Optional opaque token from `POST /events/{id}/join-request/image/upload-url`. Empty, omitted, or `null` means no image.

    RequestJoinResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, status, created_at]
      properties:
        join_request_id:
          type: string
          format: uuid
          description: UUID of the created or reactivated join request.
          example: b2c3d4e5-f6a7-8901-bcde-f01234567890
        event_id:
          type: string
          format: uuid
          description: UUID of the requested event.
          example: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
        status:
          type: string
          enum: [PENDING]
          description: Join request status. Always `PENDING` until approved or rejected by the host.
          example: PENDING
        image_url:
          type:
            - string
            - "null"
          format: uri
          description: Confirmed join-request image URL, or `null` when no image was attached. Append `-small` to fetch the small variant.
        created_at:
          type: string
          format: date-time
          description: Timestamp of the join request creation or reactivation.
          example: "2026-03-26T12:00:00+03:00"

    ApproveJoinRequestResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, join_request_status, participation_id, participation_status, updated_at]
      properties:
        join_request_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        join_request_status:
          type: string
          enum: [APPROVED]
        participation_id:
          type: string
          format: uuid
        participation_status:
          type: string
          enum: [APPROVED]
        updated_at:
          type: string
          format: date-time

    RejectJoinRequestResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, status, updated_at, cooldown_ends_at]
      properties:
        join_request_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [REJECTED]
        updated_at:
          type: string
          format: date-time
        cooldown_ends_at:
          type: string
          format: date-time

    FavoriteEventsResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteEventItem'

    FavoriteEventItem:
      type: object
      additionalProperties: false
      required: [id, title, status, privacy_level, location_address, start_time, favorited_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type:
            - string
            - "null"
        image_url:
          type:
            - string
            - "null"
        status:
          type: string
          description: Event status, for example `ACTIVE`, `IN_PROGRESS`, `CANCELED`, or `COMPLETED`.
          example: ACTIVE
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
          description: Current stored event visibility level.
          example: PUBLIC
        location_address:
          type:
            - string
            - "null"
          description: Optional human-readable location address stored for the event.
          example: Kadikoy, Istanbul
        start_time:
          type: string
          format: date-time
        end_time:
          type:
            - string
            - "null"
          format: date-time
        favorited_at:
          type: string
          format: date-time
