user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream backend_api {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend_web {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        location = /api/docs {
            return 301 /api/docs/;
        }

        location ^~ /api/docs/openapi/ {
            alias /usr/share/nginx/html/docs/openapi/;
            autoindex on;
            autoindex_format json;
        }

        location ^~ /api/docs/ {
            alias /usr/share/nginx/html/docs/swagger-ui/;
            try_files $uri $uri/ /api/docs/index.html;
        }

        location = /api/me/notifications/stream {
            proxy_pass http://backend_api/me/notifications/stream;
            proxy_http_version 1.1;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            add_header X-Accel-Buffering no;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend_web/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
