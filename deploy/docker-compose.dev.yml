name: sem-dev

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sem
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sem"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  backend:
    image: ${DOCKERHUB_NAMESPACE}/sem-backend-dev:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: "dev"
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sem
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      OTEL_SERVICE_NAME: "sem-dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp.eu01.nr-data.net"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_EXPORTER_OTLP_HEADERS: "api-key=${NEW_RELIC_LICENSE_KEY}"
      OTEL_EXPORTER_OTLP_COMPRESSION: "gzip"
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "delta"
      OTEL_EXPORTER_OTLP_METRICS_DEFAULT_HISTOGRAM_AGGREGATION: "base2_exponential_bucket_histogram"
      RESEND_CLIENT_API_KEY: ${RESEND_CLIENT_API_KEY}
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      SPACES_BUCKET: ${SPACES_BUCKET}
      SPACES_CDN_BASE_URL: ${SPACES_CDN_BASE_URL}
      SPACES_S3_REGION: ${SPACES_S3_REGION}
    networks:
      - app

  frontend:
    image: ${DOCKERHUB_NAMESPACE}/sem-frontend-dev:${IMAGE_TAG:-latest}
    pull_policy: always
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
