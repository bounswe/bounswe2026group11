<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Social Event Mapper API Docs</title>
    <link rel="stylesheet" href="./vendor/swagger-ui-dist/swagger-ui.css" />
    <link rel="stylesheet" href="./custom.css" />
    <style>
      html {
        box-sizing: border-box;
        overflow-y: scroll;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      body {
        margin: 0;
        background: #f7f9fc;
      }

      #swagger-ui {
        min-height: 100vh;
      }

      .docs-error {
        max-width: 720px;
        margin: 48px auto;
        padding: 20px 24px;
        border-radius: 12px;
        background: #ffffff;
        color: #1f2937;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        font-family: Arial, sans-serif;
        line-height: 1.5;
      }

      .docs-error h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .docs-error p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="./vendor/swagger-ui-dist/swagger-ui-bundle.js"></script>
    <script src="./vendor/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
    <script src="./swagger-initializer.js"></script>
  </body>
</html>
