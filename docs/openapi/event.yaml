openapi: 3.1.0
info:
  title: Social Event Mapper Event API
  version: 0.1.0
  description: |
    Authenticated event-management endpoints for creating and managing social events.

    Obtain an access token from the Auth API (`POST /auth/login` or
    `POST /auth/register/email/verify`) and send it as `Authorization: Bearer <token>`
    when calling protected operations in this definition.

    Behavioral notes for create-event clients:
    - The authenticated user becomes the event host.
    - A host can create at most one event with a given `title`. Reusing the same trimmed title for the same host returns `409 Conflict`.
    - Tags and constraints are persisted in the same transaction as the event.
    - Enum-like fields are case-sensitive and must be sent in uppercase.
    - `start_time` and `end_time` must be RFC 3339 date-times with a timezone designator such as `Z` or `+03:00`.
    - Each event has **exactly one** category: send a single `category_id` (not a list). It must reference an existing row in `event_category`. The default database seed defines twenty categories (ids `1`–`20`); see `CreateEventRequestBase.category_id` for the id-to-name map.
servers:
  - url: /api
tags:
  - name: Events
    description: Event creation and related request/response contracts.
paths:
  /events/{id}:
    get:
      tags: [Events]
      summary: Get event detail
      description: |
        Returns the full event-detail payload for the authenticated user.

        Visibility rules:
        - `PUBLIC` and `PROTECTED` events are readable by any authenticated user.
        - `PRIVATE` events are readable only by the host, users with an `APPROVED`
          participation, or users with an `ACCEPTED` invitation.
        - When a `PRIVATE` event is not readable by the caller, the API responds with
          `404 event_not_found` to avoid leaking the event's existence.

        Response notes:
        - `status` is returned exactly as stored on the event row; canceled and completed
          events remain readable.
        - `host_score` returns the host's cached aggregate rating summary used by discovery cards.
        - `rating_window` describes the event-specific 7-day mutation window computed from `COALESCE(end_time, start_time)`.
        - `viewer_event_rating` returns the authenticated participant's current rating for the event, if one exists.
        - `viewer_context` is always present and resolves the caller's favorite and
          participation state.
        - `host_context` is included only when the authenticated user is the event host; approved participants may include a `host_rating`.
        - `host_context.*.user` includes the managed user's cached `final_score` and total `rating_count`.
      operationId: getEventDetail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to fetch.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
      responses:
        '200':
          description: Event detail returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEventDetailResponse'
              examples:
                non_host:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    title: Istanbul Trail Run
                    description: A 10 km trail run through Belgrad Forest.
                    image_url: https://example.com/trail.jpg
                    privacy_level: PROTECTED
                    status: ACTIVE
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    capacity: 25
                    minimum_age: 18
                    preferred_gender: null
                    approved_participant_count: 12
                    pending_participant_count: 0
                    favorite_count: 8
                    created_at: "2026-03-26T11:00:00+03:00"
                    updated_at: "2026-03-27T09:30:00+03:00"
                    category:
                      id: 7
                      name: Outdoors
                    host:
                      id: 2df86e13-2d2b-4dca-8d60-f6d9f8d6bb1d
                      username: host_user
                      display_name: Host User
                      avatar_url: https://example.com/avatar.png
                    host_score:
                      final_score: 4.18
                      hosted_event_rating_count: 9
                    location:
                      type: POINT
                      address: Belgrad Forest, Istanbul
                      point:
                        lat: 41.1722
                        lon: 28.9744
                    tags: [trail, running]
                    constraints:
                      - type: equipment
                        info: Trail running shoes required
                    rating_window:
                      opens_at: "2026-05-01T12:00:00+03:00"
                      closes_at: "2026-05-08T12:00:00+03:00"
                      is_active: true
                    viewer_event_rating:
                      id: 09d1e583-7554-43a7-b21f-3e7f03804e0f
                      rating: 5
                      message: Great event host.
                      created_at: "2026-05-02T11:00:00+03:00"
                      updated_at: "2026-05-02T11:00:00+03:00"
                    viewer_context:
                      is_host: false
                      is_favorited: true
                      participation_status: PENDING
                host:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    title: Istanbul Trail Run
                    description: A 10 km trail run through Belgrad Forest.
                    image_url: https://example.com/trail.jpg
                    privacy_level: PRIVATE
                    status: CANCELED
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    capacity: 25
                    minimum_age: 18
                    preferred_gender: FEMALE
                    approved_participant_count: 12
                    pending_participant_count: 0
                    favorite_count: 8
                    created_at: "2026-03-26T11:00:00+03:00"
                    updated_at: "2026-03-27T09:30:00+03:00"
                    category:
                      id: 7
                      name: Outdoors
                    host:
                      id: 2df86e13-2d2b-4dca-8d60-f6d9f8d6bb1d
                      username: host_user
                      display_name: Host User
                      avatar_url: https://example.com/avatar.png
                    host_score:
                      final_score: 4.18
                      hosted_event_rating_count: 9
                    location:
                      type: ROUTE
                      address: Belgrad Forest, Istanbul
                      route_points:
                        - lat: 41.1722
                          lon: 28.9744
                        - lat: 41.1780
                          lon: 28.9801
                    tags: [trail, running]
                    constraints:
                      - type: equipment
                        info: Trail running shoes required
                    rating_window:
                      opens_at: "2026-05-01T12:00:00+03:00"
                      closes_at: "2026-05-08T12:00:00+03:00"
                      is_active: false
                    viewer_event_rating: null
                    viewer_context:
                      is_host: true
                      is_favorited: false
                      participation_status: NONE
                    host_context:
                      approved_participants:
                        - participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                          status: APPROVED
                          created_at: "2026-03-26T13:00:00+03:00"
                          updated_at: "2026-03-26T13:00:00+03:00"
                          host_rating:
                            id: 8395efb1-053b-4d14-8da5-ded573efbf5d
                            rating: 4
                            message: Reliable participant.
                            created_at: "2026-05-02T12:15:00+03:00"
                            updated_at: "2026-05-02T12:15:00+03:00"
                          user:
                            id: 6a5d08d6-b9f2-49c8-baea-0f39c34082f8
                            username: approved_user
                            display_name: Approved User
                            avatar_url: https://example.com/approved.png
                            final_score: 4.4
                            rating_count: 5
                      pending_join_requests:
                        - join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                          status: PENDING
                          message: I have attended similar events before.
                          created_at: "2026-03-26T14:00:00+03:00"
                          updated_at: "2026-03-26T14:00:00+03:00"
                          user:
                            id: 48095dc7-6dc1-4479-955f-70ce45e0ef64
                            username: pending_user
                            display_name: Pending User
                            avatar_url: https://example.com/pending.png
                            final_score: 3.8
                            rating_count: 2
                      invitations:
                        - invitation_id: c3d4e5f6-a7b8-9012-cdef-012345678901
                          status: ACCEPTED
                          message: Join us if you are available.
                          expires_at: "2026-04-30T23:59:59+03:00"
                          created_at: "2026-03-26T15:00:00+03:00"
                          updated_at: "2026-03-26T15:00:00+03:00"
                          user:
                            id: 27b3b93d-5f4c-4958-b0e1-0d4df6fc5c02
                            username: invited_user
                            display_name: Invited User
                            avatar_url: https://example.com/invited.png
                            final_score: 4.1
                            rating_count: 6
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event does not exist or is not visible to the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/image/upload-url:
    post:
      tags: [Events]
      summary: Create direct-upload URLs for an event image
      description: |
        Preferred event-image flow:
        1. Create the event first with `POST /events`.
        2. Call this endpoint as the event host to receive presigned `PUT` uploads for `ORIGINAL` and `SMALL`.
        3. Upload both client-generated JPEG files directly to DigitalOcean Spaces.
        4. Call `POST /events/{id}/image/confirm` with the returned `confirm_token`.

        Client rule:
        - Forward every returned upload header exactly as returned, including `x-amz-acl: public-read`.

        Naming convention:
        - original object key: `events/{event_id}/cover/v{n}-{upload_id}`
        - small object key: `events/{event_id}/cover/v{n}-{upload_id}-small`

        Persistence and cache behavior:
        - The backend stores the returned `base_url` in `event.image_url`.
        - Clients can fetch the small variant by appending `-small` to the stored `base_url`.
        - Existing files are never deleted. Each confirmed upload increments `image_version`, leaving older CDN URLs cache-safe.
        - This flow remains compatible with limited-access Spaces keys because each uploaded object is explicitly written with the `public-read` canned ACL.
      operationId: createEventImageUploadUrl
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event whose image will be uploaded.
      responses:
        '200':
          description: Presigned upload instructions created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadInitResponse'
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/image/confirm:
    post:
      tags: [Events]
      summary: Confirm an uploaded event image
      description: >
        Confirms a previously presigned event image upload after both `ORIGINAL`
        and `SMALL` files have been uploaded successfully. The request body
        contains only the opaque `confirm_token`; clients do not send object URLs back.
        The confirmed CDN URL is readable without a signed GET URL because the upload step uses `x-amz-acl: public-read`.
      operationId: confirmEventImageUpload
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event whose image upload will be confirmed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUploadConfirmRequest'
      responses:
        '204':
          description: Event image URL confirmed and persisted successfully.
        '400':
          description: Invalid event ID, invalid request body, or expired/invalid confirm token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Upload incomplete or superseded by a newer event image version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/rating:
    put:
      tags: [Events]
      summary: Create or update the caller's event rating
      description: |
        Creates or updates the authenticated participant's rating for the event.

        Rules:
        - The authenticated user must be an `APPROVED` participant of the event.
        - The event host cannot rate their own event, even though hosts have an internal approved participation row.
        - Ratings are allowed only within the 7-day window computed from `COALESCE(end_time, start_time)`.
        - `CANCELED` events cannot be rated.
        - The resource is singular per `(participant_user_id, event_id)`, so repeated `PUT` requests update the same record.
      operationId: upsertEventRating
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '200':
          description: Event rating created or updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid event id or request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not allowed to rate this event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Rating window is closed or the event is not rateable in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Events]
      summary: Delete the caller's event rating
      description: |
        Hard deletes the authenticated participant's rating for the event.
        The same authorization and rating-window rules used by `PUT /events/{id}/rating` also apply here.
      operationId: deleteEventRating
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event rating deleted successfully.
        '400':
          description: Invalid event id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not allowed to delete this event rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event or rating record does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Rating window is closed or the event is not rateable in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/participants/{participantUserId}/rating:
    put:
      tags: [Events]
      summary: Create or update a host rating for a participant
      description: |
        Creates or updates the authenticated host's rating for an approved participant of the event.

        Rules:
        - The authenticated user must host the event.
        - The target user must be an `APPROVED` participant of the same event.
        - Hosts cannot rate themselves.
        - Ratings are allowed only within the 7-day window computed from `COALESCE(end_time, start_time)`.
        - `CANCELED` events cannot be rated.
      operationId: upsertParticipantRating
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: participantUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingWriteRequest'
      responses:
        '200':
          description: Participant rating created or updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Invalid path id or request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not allowed to rate this participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Rating window is closed or the event is not rateable in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Events]
      summary: Delete a host rating for a participant
      description: |
        Hard deletes the authenticated host's rating for an approved participant of the event.
        The same authorization and rating-window rules used by `PUT /events/{id}/participants/{participantUserId}/rating` also apply here.
      operationId: deleteParticipantRating
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: participantUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Participant rating deleted successfully.
        '400':
          description: Invalid path id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not allowed to delete this participant rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event or rating record does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Rating window is closed or the event is not rateable in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join:
    post:
      tags: [Events]
      summary: Join a public event
      description: |
        Directly joins a **PUBLIC** event. Creates an APPROVED participation record for the
        authenticated user.

        Rules:
        - The event must exist and have `privacy_level: PUBLIC`.
        - The authenticated user must not be the event host.
        - A user can only join the same event once; a second attempt returns `409`.
        - Calling this endpoint on a `PROTECTED` event returns `409 event_join_not_allowed`.
      operationId: joinEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to join.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
      responses:
        '201':
          description: Successfully joined the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinEventResponse'
              examples:
                joined:
                  value:
                    participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    event_id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    status: APPROVED
                    created_at: "2026-03-26T11:00:00+03:00"
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The event host cannot join their own event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                host_cannot_join:
                  value:
                    error:
                      code: host_cannot_join
                      message: The event host cannot join their own event.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '409':
          description: |
            Conflict. Either the user is already participating (`already_participating`) or
            the event privacy level does not allow direct join (`event_join_not_allowed`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: You are already participating in this event.
                event_join_not_allowed:
                  value:
                    error:
                      code: event_join_not_allowed
                      message: Only PUBLIC events can be joined directly.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/cancel:
    patch:
      tags: [Events]
      summary: Cancel an event
      description: |
        Transitions an **ACTIVE** event to **CANCELED**. Only the event host may perform this action.

        Rules:
        - The event must exist and have `status: ACTIVE`.
        - Only the authenticated host can cancel their own event.
        - Canceled events are excluded from discovery results but remain accessible via the detail endpoint.
      operationId: cancelEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Event UUID.
      responses:
        "204":
          description: Event canceled successfully.
        "401":
          description: Missing or invalid access token.
        "403":
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_cancel_not_allowed
                  message: Only the event host can cancel this event.
        "404":
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Event is not in ACTIVE status and cannot be canceled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: event_not_cancelable
                  message: Only ACTIVE events can be canceled.

  /events/{id}/join-request:
    post:
      tags: [Events]
      summary: Request to join a protected event
      description: |
        Submits a join request for a **PROTECTED** event. Creates a `join_request`
        row with `status: PENDING` awaiting host approval.

        Rules:
        - The event must exist and have `privacy_level: PROTECTED`.
        - The authenticated user must not be the event host.
        - A user can only submit one pending request per event; a second attempt returns `409`.
        - After the host rejects a request, the same user must wait **3 days** before requesting again.
        - When the cooldown expires, the backend reactivates the same `join_request` row as `PENDING`.
        - Calling this endpoint on a `PUBLIC` event returns `409 event_join_not_allowed`.
      operationId: requestJoinEvent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to request joining.
          example: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestJoinRequest'
            examples:
              with_message:
                value:
                  message: I have attended similar events and can help with setup.
      responses:
        '201':
          description: Join request created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestJoinResponse'
              examples:
                requested:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    status: PENDING
                    created_at: "2026-03-26T12:00:00+03:00"
        '400':
          description: Invalid event ID format or malformed JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The event host cannot request to join their own event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                host_cannot_join:
                  value:
                    error:
                      code: host_cannot_join
                      message: The event host cannot request to join their own event.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '409':
          description: |
            Conflict. The caller already has a pending request (`already_requested`), is already
            participating (`already_participating`), the event privacy level does not allow join
            requests (`event_join_not_allowed`), or a rejection cooldown is still active
            (`join_request_cooldown_active`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                already_requested:
                  value:
                    error:
                      code: already_requested
                      message: You already have a pending join request for this event.
                event_join_not_allowed:
                  value:
                    error:
                      code: event_join_not_allowed
                      message: Only PROTECTED events accept join requests.
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: You are already participating in this event.
                join_request_cooldown_active:
                  value:
                    error:
                      code: join_request_cooldown_active
                      message: You must wait 3 days after rejection before requesting to join this event again.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join-requests/{joinRequestId}/approve:
    post:
      tags: [Events]
      summary: Approve a pending join request
      description: |
        Allows the authenticated event host to approve a **PENDING** join request for a
        **PROTECTED** event. Approval updates the join request to `APPROVED` and creates an
        `APPROVED` participation row atomically.
      operationId: approveJoinRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event being moderated.
        - name: joinRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the join request to approve.
      responses:
        '200':
          description: Join request approved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveJoinRequestResponse'
              examples:
                approved:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    join_request_status: APPROVED
                    participation_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    participation_status: APPROVED
                    updated_at: "2026-03-29T12:00:00+03:00"
        '400':
          description: Invalid event ID or join request ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_join_request_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        joinRequestId: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                moderation_not_allowed:
                  value:
                    error:
                      code: join_request_moderation_not_allowed
                      message: Only the event host can moderate join requests.
        '404':
          description: Event or join request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                event_not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
                join_request_not_found:
                  value:
                    error:
                      code: join_request_not_found
                      message: The requested join request does not exist.
        '409':
          description: |
            Conflict. The request is no longer pending (`join_request_state_invalid`), the
            event is full (`capacity_exceeded`), or the requester already has a participation
            row (`already_participating`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_state_invalid:
                  value:
                    error:
                      code: join_request_state_invalid
                      message: Only PENDING join requests can be approved.
                capacity_exceeded:
                  value:
                    error:
                      code: capacity_exceeded
                      message: This event has reached its maximum capacity.
                already_participating:
                  value:
                    error:
                      code: already_participating
                      message: The requester is already participating in this event.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join-requests/{joinRequestId}/reject:
    post:
      tags: [Events]
      summary: Reject a pending join request
      description: |
        Allows the authenticated event host to reject a **PENDING** join request for a
        **PROTECTED** event. Rejection updates the join request to `REJECTED` and starts a
        **3-day** re-request cooldown for the same user and event.
      operationId: rejectJoinRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event being moderated.
        - name: joinRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the join request to reject.
      responses:
        '200':
          description: Join request rejected successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectJoinRequestResponse'
              examples:
                rejected:
                  value:
                    join_request_id: b2c3d4e5-f6a7-8901-bcde-f01234567890
                    event_id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                    status: REJECTED
                    updated_at: "2026-03-29T12:00:00+03:00"
                    cooldown_ends_at: "2026-04-01T12:00:00+03:00"
        '400':
          description: Invalid event ID or join request ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: The caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                moderation_not_allowed:
                  value:
                    error:
                      code: join_request_moderation_not_allowed
                      message: Only the event host can moderate join requests.
        '404':
          description: Event or join request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_not_found:
                  value:
                    error:
                      code: join_request_not_found
                      message: The requested join request does not exist.
        '409':
          description: Conflict. The request is no longer pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                join_request_state_invalid:
                  value:
                    error:
                      code: join_request_state_invalid
                      message: Only PENDING join requests can be rejected.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events:
    get:
      tags: [Events]
      summary: Discover nearby events
      description: |
        Returns a cursor-paginated list of nearby discoverable events for the authenticated user.

        Discovery rules:
        - Only events with `status: ACTIVE` are returned.
        - Only events with `privacy_level: PUBLIC` or `PROTECTED` are returned.
        - The caller must provide `lat` and `lon`; the server filters within a radius around that origin.
        - Text search (`q`) and structured filters can be combined in the same request.
        - `is_favorited` is resolved for the authenticated user.
        - For `ROUTE` events, radius filtering matches when any stored route point falls within the requested radius.

        Sorting defaults:
        - If `q` is omitted and `sort_by` is omitted, sorting defaults to `START_TIME`.
        - If `q` is present and `sort_by` is omitted, sorting defaults to `RELEVANCE`.
        - `sort_by=RELEVANCE` is only valid when `q` is present.
        - When sorting by distance, `ROUTE` events use the first route point as their anchor location.

        Pagination:
        - Uses opaque keyset cursors returned in `page_info.next_cursor`.
        - Reuse the same filters and sort order when requesting the next page.
      operationId: discoverEvents
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          description: Latitude of the search origin in WGS 84.
          example: 41.0082
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          description: Longitude of the search origin in WGS 84.
          example: 28.9784
        - name: radius_meters
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50000
          description: Radius around (`lat`, `lon`) in meters. Defaults to `10000` when omitted.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Optional prefix-aware full-text search query applied to title, description, and denormalized tags.
        - name: privacy_levels
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [PUBLIC, PROTECTED]
          description: Optional comma-separated discoverability filter. `PRIVATE` is not allowed because private events are never returned by this endpoint.
        - name: category_ids
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
              minimum: 1
          description: Optional comma-separated category ids. Matches events whose `category_id` is in the provided set.
        - name: start_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Optional inclusive lower bound for `event.start_time`.
        - name: start_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Optional inclusive upper bound for `event.start_time`.
        - name: tag_names
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
          description: Optional comma-separated tags. v1 uses OR semantics, so an event matches if it has any listed tag.
        - name: only_favorited
          in: query
          required: false
          schema:
            type: boolean
          description: When `true`, only returns events favorited by the authenticated user. Defaults to `false` when omitted.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [START_TIME, DISTANCE, RELEVANCE]
          description: |
            Optional sort mode.
            - `START_TIME`: soonest starting events first.
            - `DISTANCE`: nearest events first.
            - `RELEVANCE`: highest full-text rank first; requires `q`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Maximum number of items to return in one page. Defaults to `20` when omitted.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor returned by a previous page of the same query.
      responses:
        '200':
          description: Discovery results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverEventsResponse'
              examples:
                nearby_events:
                  value:
                    items:
                      - id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                        title: Istanbul Trail Run
                        category_name: Sports
                        image_url: https://example.com/trail.jpg
                        start_time: "2026-05-01T08:00:00+03:00"
                        location_address: Belgrad Forest, Istanbul
                        privacy_level: PUBLIC
                        approved_participant_count: 42
                        is_favorited: true
                        host_score:
                          final_score: 4.18
                          hosted_event_rating_count: 9
                      - id: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
                        title: Bosphorus Ride
                        category_name: Fitness
                        image_url: null
                        start_time: "2026-05-01T09:30:00+03:00"
                        location_address: Besiktas, Istanbul
                        privacy_level: PROTECTED
                        approved_participant_count: 18
                        is_favorited: false
                        host_score:
                          final_score: null
                          hosted_event_rating_count: 0
                    page_info:
                      next_cursor: eyJzb3J0X2J5IjoiU1RBUlRfVElNRSIsImZpbHRlcl9maW5nZXJwcmludCI6IjQ2MmEifQ
                      has_next: true
        '400':
          description: |
            Validation error for query parameters, cursor reuse, or unsupported sort combinations.
            `error.details` contains field-specific messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_query:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        lat: lat is required
                        lon: lon is required
                invalid_sort:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        sort_by: sort_by=RELEVANCE requires q
                invalid_privacy_filter:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        privacy_levels: "privacy_levels must contain only: PUBLIC, PROTECTED"
                invalid_cursor:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        cursor: cursor does not match the active filters or sort order
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Events]
      summary: Create a new event
      description: |
        Create a point-based or route-based event. The request shape depends on `location_type`.

        Point events require `lat` and `lon`.
        Route events require at least two `route_points`.

        Each event accepts **one** `category_id` only. Use a value that exists in `event_category` (default seed: ids `1`–`20`, see schema).
        A host cannot create two events with the same `title`; duplicate host-title pairs return `409`.
      operationId: createEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
            examples:
              point_event:
                summary: Point-based event
                value:
                  title: Istanbul Trail Run
                  description: A 10 km trail run through Belgrad Forest.
                  image_url: https://example.com/trail.jpg
                  category_id: 1
                  address: Belgrad Forest, Istanbul
                  location_type: POINT
                  lat: 41.1722
                  lon: 28.9744
                  start_time: "2026-05-01T08:00:00+03:00"
                  end_time: "2026-05-01T12:00:00+03:00"
                  privacy_level: PUBLIC
                  capacity: 50
                  minimum_age: 16
                  preferred_gender: MALE
                  tags: [trail, running, outdoor]
                  constraints:
                    - type: equipment
                      info: Trail running shoes required
              route_event:
                summary: Route-based event
                value:
                  title: Bosphorus Ride
                  description: A route-based cycling meetup.
                  category_id: 8
                  address: Besiktas, Istanbul
                  location_type: ROUTE
                  route_points:
                    - lat: 41.0400
                      lon: 29.0000
                    - lat: 41.0500
                      lon: 29.0200
                    - lat: 41.0600
                      lon: 29.0400
                  start_time: "2026-06-12T07:30:00+03:00"
                  privacy_level: PROTECTED
                  tags: [cycling, group-ride]
      responses:
        '201':
          description: Event created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEventResponse'
              examples:
                created:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    title: Istanbul Trail Run
                    privacy_level: PUBLIC
                    status: ACTIVE
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    created_at: "2026-03-26T11:00:00+03:00"
        '400':
          description: |
            Validation error. The response message stays generic and
            `error.details` contains field-specific messages keyed by the problematic field path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_point_payload:
                  summary: Missing required fields and invalid enum values
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        description: description is required
                        category_id: category_id is required
                        privacy_level: "must be one of: PUBLIC, PROTECTED, PRIVATE"
                        preferred_gender: "must be one of: MALE, FEMALE, OTHER"
                invalid_route_payload:
                  summary: Nested validation details for route and constraints
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        route_points: route_points must contain at least 2 points when location_type is ROUTE
                        constraints[0].type: type is required
                        constraints[1].info: info is required
                invalid_category_id:
                  summary: category_id does not exist in event_category
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        category_id: must reference an existing event category id
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_token:
                  value:
                    error:
                      code: missing_token
                      message: Authorization header with Bearer token is required.
        '409':
          description: The authenticated host already has an event with the same title.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                duplicate_host_title:
                  value:
                    error:
                      code: event_title_already_exists
                      message: The host already has an event with this title.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateEventRequest:
      oneOf:
        - $ref: '#/components/schemas/CreatePointEventRequest'
        - $ref: '#/components/schemas/CreateRouteEventRequest'

    CreateEventRequestBase:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - category_id
        - location_type
        - start_time
        - privacy_level
      properties:
        title:
          type: string
          description: Event title. Must be unique per host after server-side trimming.
          example: Istanbul Trail Run
        description:
          type: string
          description: Event description.
          example: A 10 km trail run through Belgrad Forest.
        image_url:
          type:
            - string
            - "null"
          description: >
            Optional event cover image URL. Backward-compatible field for callers
            that already host images elsewhere. New clients should prefer the
            direct-upload flow at `POST /events/{id}/image/upload-url`.
        category_id:
          type: integer
          minimum: 1
          description: |
            **Exactly one** category per event: this field is a single integer foreign key to
            `event_category.id` (not an array of categories). With the default migration seed
            (`000011_event_category_seed`), ids `1`–`20` are defined as follows:

            | id | name |
            |---:|------|
            | 1 | Sports |
            | 2 | Music |
            | 3 | Education |
            | 4 | Technology |
            | 5 | Art |
            | 6 | Food & Drink |
            | 7 | Outdoors |
            | 8 | Fitness |
            | 9 | Networking |
            | 10 | Gaming |
            | 11 | Charity |
            | 12 | Photography |
            | 13 | Travel |
            | 14 | Workshops |
            | 15 | Conferences |
            | 16 | Movies & Cinema |
            | 17 | Theatre |
            | 18 | Books & Literature |
            | 19 | Wellness |
            | 20 | Volunteering |

            If your database adds more categories later, valid ids may exceed `20`; the API
            accepts any positive integer that exists in `event_category`. Unknown ids return
            `400` with `error.details.category_id` describing the problem.
          example: 1
        address:
          type:
            - string
            - "null"
          description: Optional human-readable address of the event location.
        start_time:
          type: string
          format: date-time
          description: RFC 3339 date-time with timezone, for example `2026-05-01T08:00:00+03:00`.
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          description: Optional RFC 3339 date-time with timezone. Must be after `start_time`.
          example: "2026-05-01T12:00:00+03:00"
        capacity:
          type:
            - integer
            - "null"
          minimum: 1
          description: Optional maximum participant count. Omit or send `null` for unlimited capacity.
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
          description: |
            - `PUBLIC`: visible to all, joinable without approval.
            - `PROTECTED`: discoverable but requires host approval.
            - `PRIVATE`: only visible to invited users.
        minimum_age:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 120
          description: Optional minimum participant age.
        preferred_gender:
          oneOf:
            - type: string
              enum: [MALE, FEMALE, OTHER]
            - type: "null"
          description: Optional preferred gender for participants.
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 5
          description: Optional tags. At most 5 tags, each at most 20 characters.
          example: [trail, running]
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintInput'
          maxItems: 5
          description: Optional participation constraints. At most 5 items.

    CreatePointEventRequest:
      allOf:
        - $ref: '#/components/schemas/CreateEventRequestBase'
        - type: object
          additionalProperties: false
          required:
            - location_type
            - lat
            - lon
          properties:
            location_type:
              type: string
              enum: [POINT]
              description: Geometry type of the event location.
            lat:
              type: number
              format: double
              description: Latitude of the event location (WGS 84). Required when `location_type` is `POINT`.
              example: 41.1722
            lon:
              type: number
              format: double
              description: Longitude of the event location (WGS 84). Required when `location_type` is `POINT`.
              example: 28.9744

    CreateRouteEventRequest:
      allOf:
        - $ref: '#/components/schemas/CreateEventRequestBase'
        - type: object
          additionalProperties: false
          required:
            - location_type
            - route_points
          properties:
            location_type:
              type: string
              enum: [ROUTE]
              description: Geometry type of the event location.
            route_points:
              type: array
              minItems: 2
              description: Route coordinates in order. Required when `location_type` is `ROUTE`.
              items:
                $ref: '#/components/schemas/RoutePointInput'

    RoutePointInput:
      type: object
      additionalProperties: false
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
          example: 41.0400
        lon:
          type: number
          format: double
          example: 29.0000

    ConstraintInput:
      type: object
      additionalProperties: false
      required: [type, info]
      properties:
        type:
          type: string
          description: Category of the constraint.
          example: equipment
        info:
          type: string
          description: Human-readable description of the constraint.
          example: Trail running shoes required

    DiscoverEventsResponse:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DiscoverEventItem'
        page_info:
          $ref: '#/components/schemas/DiscoverEventsPageInfo'

    DiscoverEventItem:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - category_name
        - start_time
        - privacy_level
        - approved_participant_count
        - is_favorited
        - host_score
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        title:
          type: string
          description: Event title.
          example: Istanbul Trail Run
        category_name:
          type: string
          description: Human-readable event category name.
          example: Sports
        image_url:
          type:
            - string
            - "null"
          description: Optional event cover image URL.
          example: https://example.com/trail.jpg
        start_time:
          type: string
          format: date-time
          description: Event start time.
          example: "2026-05-01T08:00:00+03:00"
        location_address:
          type:
            - string
            - "null"
          description: Optional human-readable location address.
          example: Belgrad Forest, Istanbul
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED]
          description: Visibility level for the discoverable event.
          example: PUBLIC
        approved_participant_count:
          type: integer
          minimum: 0
          description: Current count of approved participants.
          example: 42
        is_favorited:
          type: boolean
          description: Whether the authenticated user has favorited the event.
          example: true
        host_score:
          $ref: '#/components/schemas/EventHostScoreSummary'

    DiscoverEventsPageInfo:
      type: object
      additionalProperties: false
      required: [next_cursor, has_next]
      properties:
        next_cursor:
          type:
            - string
            - "null"
          description: Opaque cursor for the next page, or `null` when there is no next page.
          example: eyJzb3J0X2J5IjoiU1RBUlRfVElNRSIsImZpbHRlcl9maW5nZXJwcmludCI6IjQ2MmEifQ
        has_next:
          type: boolean
          description: Indicates whether more results are available.
          example: true

    GetEventDetailResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - privacy_level
        - status
        - start_time
        - approved_participant_count
        - pending_participant_count
        - favorite_count
        - created_at
        - updated_at
        - host
        - host_score
        - location
        - tags
        - constraints
        - rating_window
        - viewer_event_rating
        - viewer_context
      properties:
        id:
          type: string
          format: uuid
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        title:
          type: string
          example: Istanbul Trail Run
        description:
          type:
            - string
            - "null"
          example: A 10 km trail run through Belgrad Forest.
        image_url:
          type:
            - string
            - "null"
          example: https://example.com/trail.jpg
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
        status:
          type: string
          description: Current event status as stored in the database, for example `ACTIVE`, `IN_PROGRESS`, `CANCELED`, or `COMPLETED`.
          example: ACTIVE
        start_time:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-05-01T12:00:00+03:00"
        capacity:
          type:
            - integer
            - "null"
          minimum: 1
          example: 25
        minimum_age:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 120
          example: 18
        preferred_gender:
          oneOf:
            - type: string
              enum: [MALE, FEMALE, OTHER]
            - type: "null"
        approved_participant_count:
          type: integer
          minimum: 0
          example: 12
        pending_participant_count:
          type: integer
          minimum: 0
          example: 0
        favorite_count:
          type: integer
          minimum: 0
          example: 8
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T11:00:00+03:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-27T09:30:00+03:00"
        category:
          oneOf:
            - $ref: '#/components/schemas/EventDetailCategory'
            - type: "null"
        host:
          $ref: '#/components/schemas/EventDetailUserSummary'
        host_score:
          $ref: '#/components/schemas/EventHostScoreSummary'
        location:
          $ref: '#/components/schemas/EventDetailLocation'
        tags:
          type: array
          items:
            type: string
          example: [trail, running]
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintInput'
        rating_window:
          $ref: '#/components/schemas/EventDetailRatingWindow'
        viewer_event_rating:
          oneOf:
            - $ref: '#/components/schemas/EventDetailEmbeddedRating'
            - type: "null"
        viewer_context:
          $ref: '#/components/schemas/EventDetailViewerContext'
        host_context:
          $ref: '#/components/schemas/EventDetailHostContext'
          description: Present only when the authenticated user is the event host.

    EventDetailCategory:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: integer
          minimum: 1
          example: 7
        name:
          type: string
          example: Outdoors

    EventDetailUserSummary:
      type: object
      additionalProperties: false
      required: [id, username]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: host_user
        display_name:
          type:
            - string
            - "null"
          example: Host User
        avatar_url:
          type:
            - string
            - "null"
          example: https://example.com/avatar.png

    EventDetailHostContextUserSummary:
      type: object
      additionalProperties: false
      required: [id, username, final_score, rating_count]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: approved_user
        display_name:
          type:
            - string
            - "null"
          example: Approved User
        avatar_url:
          type:
            - string
            - "null"
          example: https://example.com/avatar.png
        final_score:
          type:
            - number
            - "null"
          format: double
          example: 4.4
        rating_count:
          type: integer
          minimum: 0
          example: 5

    EventDetailLocation:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          enum: [POINT, ROUTE]
        address:
          type:
            - string
            - "null"
          example: Belgrad Forest, Istanbul
        point:
          oneOf:
            - $ref: '#/components/schemas/EventDetailPoint'
            - type: "null"
        route_points:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailPoint'

    EventDetailPoint:
      type: object
      additionalProperties: false
      required: [lat, lon]
      properties:
        lat:
          type: number
          format: double
          example: 41.1722
        lon:
          type: number
          format: double
          example: 28.9744

    EventDetailViewerContext:
      type: object
      additionalProperties: false
      required: [is_host, is_favorited, participation_status]
      properties:
        is_host:
          type: boolean
        is_favorited:
          type: boolean
        participation_status:
          type: string
          enum: [JOINED, PENDING, INVITED, NONE]
          description: |
            Resolved for the authenticated user with the following precedence:
            approved participation -> `JOINED`, pending join request -> `PENDING`,
            invitation row -> `INVITED`, otherwise `NONE`.

    EventHostScoreSummary:
      type: object
      additionalProperties: false
      required: [final_score, hosted_event_rating_count]
      properties:
        final_score:
          type:
            - number
            - "null"
          format: double
          example: 4.18
        hosted_event_rating_count:
          type: integer
          minimum: 0
          example: 9

    EventDetailRatingWindow:
      type: object
      additionalProperties: false
      required: [opens_at, closes_at, is_active]
      properties:
        opens_at:
          type: string
          format: date-time
        closes_at:
          type: string
          format: date-time
        is_active:
          type: boolean

    EventDetailEmbeddedRating:
      type: object
      additionalProperties: false
      required: [id, rating, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EventDetailHostContext:
      type: object
      additionalProperties: false
      required: [approved_participants, pending_join_requests, invitations]
      properties:
        approved_participants:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailApprovedParticipant'
        pending_join_requests:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailPendingJoinRequest'
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/EventDetailInvitation'

    EventDetailApprovedParticipant:
      type: object
      additionalProperties: false
      required: [participation_id, status, created_at, updated_at, host_rating, user]
      properties:
        participation_id:
          type: string
          format: uuid
        status:
          type: string
          example: APPROVED
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        host_rating:
          oneOf:
            - $ref: '#/components/schemas/EventDetailEmbeddedRating'
            - type: "null"
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    EventDetailPendingJoinRequest:
      type: object
      additionalProperties: false
      required: [join_request_id, status, created_at, updated_at, user]
      properties:
        join_request_id:
          type: string
          format: uuid
        status:
          type: string
          example: PENDING
        message:
          type:
            - string
            - "null"
          example: I have attended similar events before.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    EventDetailInvitation:
      type: object
      additionalProperties: false
      required: [invitation_id, status, created_at, updated_at, user]
      properties:
        invitation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, ACCEPTED, DECLINED, EXPIRED]
        message:
          type:
            - string
            - "null"
          example: Join us if you are available.
        expires_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-30T23:59:59+03:00"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/EventDetailHostContextUserSummary'

    RatingWriteRequest:
      type: object
      additionalProperties: false
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        message:
          type:
            - string
            - "null"
          minLength: 10
          maxLength: 100
          description: Optional feedback message. Blank-after-trim strings are treated as `null`.
          example: Great event host.

    RatingResponse:
      type: object
      additionalProperties: false
      required: [id, rating, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEventResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - privacy_level
        - status
        - start_time
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the newly created event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        title:
          type: string
          description: Title of the created event.
          example: Istanbul Trail Run
        privacy_level:
          type: string
          enum: [PUBLIC, PROTECTED, PRIVATE]
          example: PUBLIC
        status:
          type: string
          enum: [ACTIVE]
          example: ACTIVE
        start_time:
          type: string
          format: date-time
          example: "2026-05-01T08:00:00+03:00"
        end_time:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-05-01T12:00:00+03:00"
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T11:00:00+03:00"

    ImageUploadInitResponse:
      type: object
      additionalProperties: false
      required: [base_url, version, confirm_token, uploads]
      properties:
        base_url:
          type: string
          description: >
            Versioned CDN base URL persisted in the database after confirm.
            Append `-small` to fetch the small variant.
          example: "https://sem-bucket.fra1.cdn.digitaloceanspaces.com/events/5f81d6de-8cb4-4639-8f60-7c9f55456121/cover/v2-2c1a8d5a-77c5-4e6a-b5da-84af656ba6fa"
        version:
          type: integer
          minimum: 1
          description: New image version reserved for this upload attempt.
          example: 2
        confirm_token:
          type: string
          description: Opaque signed token required by the confirm endpoint.
        uploads:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/ImageUploadInstruction'

    ImageUploadInstruction:
      type: object
      additionalProperties: false
      required: [variant, method, url, headers]
      properties:
        variant:
          type: string
          enum: [ORIGINAL, SMALL]
        method:
          type: string
          enum: [PUT]
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
          description: >
            Headers that must be sent exactly as returned. Current uploads require
            `Content-Type: image/jpeg` and
            `Cache-Control: public, max-age=604800, immutable`, and
            `x-amz-acl: public-read`.
          example:
            Content-Type: image/jpeg
            Cache-Control: public, max-age=604800, immutable
            x-amz-acl: public-read

    ImageUploadConfirmRequest:
      type: object
      additionalProperties: false
      required: [confirm_token]
      properties:
        confirm_token:
          type: string
          description: Opaque signed token returned by the corresponding upload-url endpoint.

    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    ErrorBody:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: The request body contains invalid fields.
        details:
          type: object
          additionalProperties:
            type: string
          description: Optional field-level validation details keyed by field name.

    JoinEventResponse:
      type: object
      additionalProperties: false
      required: [participation_id, event_id, status, created_at]
      properties:
        participation_id:
          type: string
          format: uuid
          description: UUID of the newly created participation record.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        event_id:
          type: string
          format: uuid
          description: UUID of the joined event.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
        status:
          type: string
          enum: [APPROVED]
          description: Participation status. Always `APPROVED` for direct joins of public events.
          example: APPROVED
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T11:00:00+03:00"

    RequestJoinRequest:
      type: object
      additionalProperties: false
      properties:
        message:
          type:
            - string
            - "null"
          description: Optional note from the requester to the event host. Omit or send `null` when no message is needed.
          example: I have attended similar events and can help with setup.

    RequestJoinResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, status, created_at]
      properties:
        join_request_id:
          type: string
          format: uuid
          description: UUID of the newly created join request.
          example: b2c3d4e5-f6a7-8901-bcde-f01234567890
        event_id:
          type: string
          format: uuid
          description: UUID of the requested event.
          example: 7a2c8b1e-3d4f-5e6a-bcde-f90123456789
        status:
          type: string
          enum: [PENDING]
          description: Join request status. Always `PENDING` until approved or rejected by the host.
          example: PENDING
        created_at:
          type: string
          format: date-time
          example: "2026-03-26T12:00:00+03:00"

    ApproveJoinRequestResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, join_request_status, participation_id, participation_status, updated_at]
      properties:
        join_request_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        join_request_status:
          type: string
          enum: [APPROVED]
        participation_id:
          type: string
          format: uuid
        participation_status:
          type: string
          enum: [APPROVED]
        updated_at:
          type: string
          format: date-time

    RejectJoinRequestResponse:
      type: object
      additionalProperties: false
      required: [join_request_id, event_id, status, updated_at, cooldown_ends_at]
      properties:
        join_request_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [REJECTED]
        updated_at:
          type: string
          format: date-time
        cooldown_ends_at:
          type: string
          format: date-time
