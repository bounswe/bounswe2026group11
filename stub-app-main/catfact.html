<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Cat Fact</title>
</head>
<body>
  <h1>Random Cat Fact</h1>
  <p>This page shows a random cat fact from a public API.</p>

  <p id="fact">Loading...</p>

  <a href="index.html">Back</a>

  <script>
    fetch("https://catfact.ninja/fact")
      .then(response => response.json())
      .then(data => {
        document.getElementById("fact").textContent = data.fact;
      })
      .catch(() => {
        document.getElementById("fact").textContent = "Could not load cat fact.";
      });
  </script>
</body>
</html>
