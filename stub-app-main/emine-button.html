<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button 7 - Individual API Page</title>
</head>
<body>
    <h1>Lab 5 Individual Task - Button 7</h1>
    <p>Click the button below to fetch data from the public Todo API:</p>
    
    <button onclick="fetchData()">Show API Data</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap; font-family: monospace; background-color: #f9f9f9;">
        No data loaded yet.
    </div>

    <p><strong>Description:</strong> This page uses the JSONPlaceholder API to fetch a sample 'todo' item. It demonstrates asynchronous data retrieval and dynamic UI updates.</p>

    <script>
        /**
         * Fetches a sample todo item from a public API
         * and renders the JSON result in the 'result' div.
         */
        function fetchData() {
            // API Endpoint for a single todo item
            const apiURL = 'https://jsonplaceholder.typicode.com/todos/1';

            fetch(apiURL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    // Inject formatted JSON string into the HTML
                    document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    // Handle and display potential errors
                    document.getElementById('result').innerText = "An error occurred while fetching data.";
                    console.error('Fetch Error:', error);
                });
        }
    </script>
</body>
</html>
