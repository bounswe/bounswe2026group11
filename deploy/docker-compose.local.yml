name: sem-local

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sem
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sem"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: "local"
      APP_PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081,exp://localhost:8081,https://socialeventmapper.com,https://www.socialeventmapper.com,https://*.socialeventmapper.com}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-4194304}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sem
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_CLIENT_API_KEY: ${RESEND_CLIENT_API_KEY}
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      SPACES_BUCKET: ${SPACES_BUCKET}
      SPACES_CDN_BASE_URL: ${SPACES_CDN_BASE_URL}
      SPACES_S3_REGION: ${SPACES_S3_REGION}
      PUSH_PROVIDER: mock
    networks:
      - app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_MAPS_WEB_API_KEY: ${VITE_GOOGLE_MAPS_WEB_API_KEY}
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ../docs/openapi:/usr/share/nginx/html/docs/openapi:ro
      - ../docs/swagger-ui:/usr/share/nginx/html/docs/swagger-ui:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
