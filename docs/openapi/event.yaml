openapi: 3.1.0
info:
  title: Social Event Mapper Event API
  version: 0.1.0
  description: |
    Authenticated event-management endpoints for creating and managing social events.

    Obtain an access token from the Auth API (`POST /auth/login` or
    `POST /auth/register/email/verify`) and send it as `Authorization: Bearer <token>`
    when calling protected operations in this definition.

    Behavioral notes for create-event clients:
    - The authenticated user becomes the event host.
    - A host can create at most one event with a given `title`. Reusing the same trimmed title for the same host returns `409 Conflict`.
    - Tags and constraints are persisted in the same transaction as the event.
    - Enum-like fields are case-sensitive and must be sent in uppercase.
    - `start_time` and `end_time` must be RFC 3339 date-times with a timezone designator such as `Z` or `+03:00`.
    - Each event has **exactly one** category: send a single `category_id` (not a list). It must reference an existing row in `event_category`. The default database seed defines twenty categories (ids `1`–`20`); see `CreateEventRequestBase.category_id` for the id-to-name map.
servers:
  - url: /api
tags:
  - name: Events
    description: Event creation and related request/response contracts.
paths:
  /events/{id}:
    patch:
      tags: [Events]
      summary: Update an active event
      description: |
        Allows the authenticated host to edit an `ACTIVE` event before it starts.
        The request is partial: omitted fields are unchanged, while explicit `null`
        clears nullable fields such as `description`, `category_id`, `address`,
        `end_time`, and `capacity`.

        Reconfirmation-triggering changes are `title`, `description`, `category_id`,
        location/address/geometry/route changes, `start_time`, `end_time`, and
        adding a new constraint. When any of those changes occur, all currently
        `APPROVED` non-host participations become `PENDING`, their active tickets
        become `PENDING`, and participants receive an `EVENT_RECONFIRMATION_REQUIRED`
        notification with deep link `/events/{id}`. Users already in `PENDING` are
        not notified.

        `constraints`, when present, replaces the full constraint list. Removing
        constraints alone does not require reconfirmation. `capacity` cannot be set
        below `approved_participant_count + pending_participant_count`.
      operationId: updateEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateEventResponse'
        '400':
          description: Invalid event ID, JSON body, or update fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Event is not editable or capacity is below approved plus pending participants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags: [Events]
      summary: Get event detail
      description: |
        Returns the full event-detail payload for the caller. Authentication is optional —
        both unauthenticated and authenticated requests are accepted.

        Visibility rules:
        - `PUBLIC` and `PROTECTED` events are readable by any caller, authenticated or not.
        - `PRIVATE` events are readable only by the host, users with an `APPROVED`
          participation, users with an `ACCEPTED` invitation, or users with a `PENDING`
          invitation (so invited users can review the event before responding). Anonymous
          callers cannot read `PRIVATE` events.
        - When a `PRIVATE` event is not readable by the caller, the API responds with
          `404 event_not_found` to avoid leaking the event's existence.

        Response notes:
        - `status` is returned exactly as stored on the event row; canceled and completed
          events remain readable.
        - `host_score` returns the host's cached aggregate rating summary used by discovery cards.
        - `rating_window` describes the event-specific 7-day mutation window computed from `COALESCE(end_time, start_time)`.
        - `viewer_event_rating` returns the authenticated participant's current rating for the event, if one exists.
        - `viewer_context` is always present. For unauthenticated callers, `participation_status`
          is `null`, `join_request_status` is `null`, and `is_favorited` is `false`.
        - `viewer_context.participation_status` contains only real participation rows:
          `APPROVED`, `PENDING`, `LEAVED`, `CANCELED`, or `null`. Pending join requests
          are exposed separately as `viewer_context.join_request_status`.
        - When an accepted participant must reconfirm edited event details,
          `viewer_context.needs_reconfirmation` is `true` and `viewer_context.event_diff`
          compares the user's `last_confirmed_event_version` with the latest event version.
        - Responses are viewer-specific when a bearer token is supplied, so the endpoint returns
          `Cache-Control: private, no-store` and `Vary: Authorization`.
        - Host management collections are no longer embedded in this response. Hosts should use
          `GET /events/{id}/host-context`, `GET /events/{id}/participants`,
          `GET /events/{id}/join-requests`, and `GET /events/{id}/invitations`.
      operationId: getEventDetail
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event to fetch.
          example: 5f81d6de-8cb4-4639-8f60-7c9f55456121
      responses:
        '200':
          description: Event detail returned successfully.
          headers:
            Cache-Control:
              description: Viewer-specific responses are not cacheable.
              schema:
                type: string
                example: private, no-store
            Vary:
              description: Indicates that authenticated and anonymous responses must not share caches.
              schema:
                type: string
                example: Authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEventDetailResponse'
              examples:
                non_host:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    version_no: 5
                    title: Istanbul Trail Run
                    description: A 10 km trail run through Belgrad Forest.
                    image_url: https://example.com/trail.jpg
                    privacy_level: PROTECTED
                    status: ACTIVE
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    capacity: 25
                    minimum_age: 18
                    preferred_gender: null
                    approved_participant_count: 12
                    pending_participant_count: 0
                    favorite_count: 8
                    created_at: "2026-03-26T11:00:00+03:00"
                    updated_at: "2026-03-27T09:30:00+03:00"
                    category:
                      id: 7
                      name: Outdoors
                    host:
                      id: 2df86e13-2d2b-4dca-8d60-f6d9f8d6bb1d
                      username: host_user
                      display_name: Host User
                      avatar_url: https://example.com/avatar.png
                    host_score:
                      final_score: 4.18
                      hosted_event_rating_count: 9
                    location:
                      type: POINT
                      address: Belgrad Forest, Istanbul
                      point:
                        lat: 41.1722
                        lon: 28.9744
                    tags: [trail, running]
                    constraints:
                      - type: equipment
                        info: Trail running shoes required
                    rating_window:
                      opens_at: "2026-05-01T12:00:00+03:00"
                      closes_at: "2026-05-08T12:00:00+03:00"
                      is_active: true
                    viewer_event_rating:
                      id: 09d1e583-7554-43a7-b21f-3e7f03804e0f
                      rating: 5
                      message: Great event host.
                      created_at: "2026-05-02T11:00:00+03:00"
                      updated_at: "2026-05-02T11:00:00+03:00"
                    viewer_context:
                      is_host: false
                      is_favorited: true
                      participation_status: APPROVED
                      join_request_status: null
                      invitation_status: null
                      needs_reconfirmation: false
                      last_confirmed_event_version: 5
                      latest_event_version: 5
                      event_diff: null
                host:
                  value:
                    id: 5f81d6de-8cb4-4639-8f60-7c9f55456121
                    version_no: 5
                    title: Istanbul Trail Run
                    description: A 10 km trail run through Belgrad Forest.
                    image_url: https://example.com/trail.jpg
                    privacy_level: PRIVATE
                    status: CANCELED
                    start_time: "2026-05-01T08:00:00+03:00"
                    end_time: "2026-05-01T12:00:00+03:00"
                    capacity: 25
                    minimum_age: 18
                    preferred_gender: FEMALE
                    approved_participant_count: 12
                    pending_participant_count: 0
                    favorite_count: 8
                    created_at: "2026-03-26T11:00:00+03:00"
                    updated_at: "2026-03-27T09:30:00+03:00"
                    category:
                      id: 7
                      name: Outdoors
                    host:
                      id: 2df86e13-2d2b-4dca-8d60-f6d9f8d6bb1d
                      username: host_user
                      display_name: Host User
                      avatar_url: https://example.com/avatar.png
                    host_score:
                      final_score: 4.18
                      hosted_event_rating_count: 9
                    location:
                      type: ROUTE
                      address: Belgrad Forest, Istanbul
                      route_points:
                        - lat: 41.1722
                          lon: 28.9744
                        - lat: 41.1780
                          lon: 28.9801
                    tags: [trail, running]
                    constraints:
                      - type: equipment
                        info: Trail running shoes required
                    rating_window:
                      opens_at: "2026-05-01T12:00:00+03:00"
                      closes_at: "2026-05-08T12:00:00+03:00"
                      is_active: false
                    viewer_event_rating: null
                    viewer_context:
                      is_host: true
                      is_favorited: false
                      participation_status: null
                      join_request_status: null
                      invitation_status: null
                      needs_reconfirmation: false
                      last_confirmed_event_version: null
                      latest_event_version: 5
                      event_diff: null
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid_id:
                  value:
                    error:
                      code: validation_error
                      message: The request body contains invalid fields. See error.details for field-specific messages.
                      details:
                        id: must be a valid UUID
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event does not exist or is not visible to the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    error:
                      code: event_not_found
                      message: The requested event does not exist.
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/host-context:
    get:
      tags: [Events]
      summary: Get host management summary
      description: |
        Returns host-only management counters for the event without loading the underlying
        participant, join-request, or invitation collections.
      operationId: getEventHostContextSummary
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Host management summary returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventHostContextSummaryResponse'
        '400':
          description: Invalid event id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: event_host_management_not_allowed
                  message: Only the event host can access this management resource.
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/participation/reconfirm:
    post:
      tags: [Events]
      summary: Reconfirm participation after event details changed
      description: |
        Allows an authenticated participant with `PENDING` participation status to
        reconfirm attendance for the latest event details. On success the
        participation becomes `APPROVED`, `reconfirmed_at` and
        `last_confirmed_event_version` are updated, and the participant's ticket,
        including an existing `PENDING` ticket created by an event edit, is
        reactivated as `ACTIVE`.
      operationId: reconfirmEventParticipation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      responses:
        '200':
          description: Participation reconfirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconfirmParticipationResponse'
        '400':
          description: Invalid event ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Host cannot reconfirm as a participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Caller does not have a PENDING participation or event is no longer joinable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/participants:
    get:
      tags: [Events]
      summary: List approved participants for a hosted event
      description: |
        Returns a cursor-paginated list of approved participants visible only to the event host.
      operationId: listEventApprovedParticipants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
        - $ref: '#/components/parameters/EventCollectionLimitParam'
        - $ref: '#/components/parameters/EventCollectionCursorParam'
        - $ref: '#/components/parameters/ParticipationStatusParam'
      responses:
        '200':
          description: Approved participants returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventApprovedParticipantsResponse'
        '400':
          description: Invalid event id or pagination cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/join-requests:
    get:
      tags: [Events]
      summary: List pending join requests for a hosted event
      description: |
        Returns a cursor-paginated list of pending join requests visible only to the event host.
      operationId: listEventPendingJoinRequests
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
        - $ref: '#/components/parameters/EventCollectionLimitParam'
        - $ref: '#/components/parameters/EventCollectionCursorParam'
      responses:
        '200':
          description: Pending join requests returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPendingJoinRequestsResponse'
        '400':
          description: Invalid event id or pagination cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/invitations:
    get:
      tags: [Events]
      summary: List invitations for a hosted event
      description: |
        Returns a cursor-paginated list of invitations visible only to the event host.
      operationId: listEventInvitations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
        - $ref: '#/components/parameters/EventCollectionLimitParam'
        - $ref: '#/components/parameters/EventCollectionCursorParam'
      responses:
        '200':
          description: Invitations returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventInvitationsResponse'
        '400':
          description: Invalid event id or pagination cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Events]
      summary: Invite users to a private event
      description: |
        Allows the authenticated event host to invite up to 100 users by exact username.
        This endpoint is supported only for `PRIVATE` events. The request is partial-success
        for per-username business outcomes: unknown or syntactically invalid usernames are
        returned in `invalid_usernames`, and known but ineligible usernames are returned in
        `failed` with a stable reason code. System errors still fail the whole request.
        Each successfully created invitation creates a notification for the invited user with
        the event image URL when present. Notification delivery failures do not fail the
        invitation batch.
      operationId: createEventInvitations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventInvitationsRequest'
      responses:
        '201':
          description: Invitation batch processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEventInvitationsResponse'
        '400':
          description: Invalid event id, JSON body, or username count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Event is not private or is no longer joinable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/image/upload-url:
    post:
      tags: [Events]
      summary: Create direct-upload URLs for an event image
      description: |
        Preferred event-image flow:
        1. Create the event first with `POST /events`.
        2. Call this endpoint as the event host to receive presigned `PUT` uploads for `ORIGINAL` and `SMALL`.
        3. Upload both client-generated JPEG files directly to DigitalOcean Spaces.
        4. Call `POST /events/{id}/image/confirm` with the returned `confirm_token`.

        Client rule:
        - Forward every returned upload header exactly as returned, including `x-amz-acl: public-read`.

        Naming convention:
        - original object key: `events/{event_id}/cover/v{n}-{upload_id}`
        - small object key: `events/{event_id}/cover/v{n}-{upload_id}-small`

        Persistence and cache behavior:
        - The backend stores the returned `base_url` in `event.image_url`.
        - Clients can fetch the small variant by appending `-small` to the stored `base_url`.
        - Existing files are never deleted. Each confirmed upload increments `image_version`, leaving older CDN URLs cache-safe.
        - This flow remains compatible with limited-access Spaces keys because each uploaded object is explicitly written with the `public-read` canned ACL.
      operationId: createEventImageUploadUrl
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event whose image will be uploaded.
      responses:
        '200':
          description: Presigned upload instructions created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadInitResponse'
        '400':
          description: Invalid event ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/image/confirm:
    post:
      tags: [Events]
      summary: Confirm an uploaded event image
      description: >
        Confirms a previously presigned event image upload after both `ORIGINAL`
        and `SMALL` files have been uploaded successfully. The request body
        contains only the opaque `confirm_token`; clients do not send object URLs back.
        The confirmed CDN URL is readable without a signed GET URL because the upload step uses `x-amz-acl: public-read`.
      operationId: confirmEventImageUpload
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the event whose image upload will be confirmed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUploadConfirmRequest'
      responses:
        '204':
          description: Event image URL confirmed and persisted successfully.
        '400':
          description: Invalid event ID, invalid request body, or expired/invalid confirm token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not the event host.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Upload incomplete or superseded by a newer event image version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /events/{id}/comments:
    get:
      tags: [Events]
      summary: List event discussion and review comments
      description: |
        Returns top-level comments for a PUBLIC or PROTECTED event. Authentication is optional.

        The response always contains two independently paginated collections:
        `discussion_comments` and `review_comments`, both ordered by latest comment first.
        Child comments are not embedded; use `GET /events/{id}/comments/{commentId}/replies`
        when the user chooses to see replies. Reply collections are ordered by oldest reply first
        so threaded conversations read chronologically.

        PRIVATE events do not expose comments. If the authenticated caller can otherwise see
        the private event, the API returns `409 comments_not_allowed`; if not visible, it returns
        `404 event_not_found`.
      operationId: listEventComments
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: discussion_limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: discussion_cursor
          in: query
          schema:
            type: string
          description: Opaque cursor for the next discussion page.
        - name: review_limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: review_cursor
          in: query
          schema:
            type: string
          description: Opaque cursor for the next review page.
      responses:
        '200':
